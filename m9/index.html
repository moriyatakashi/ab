<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m9 / 振り返り</title>
<link rel="stylesheet" href="../style.css">
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:20px; }
  .back-link:hover { color:var(--accent); }

  .hero { background:var(--accent); color:#fff; border-radius:14px; padding:20px 18px; margin-bottom:16px; text-align:center; }
  .hero-icon { font-size:2rem; margin-bottom:6px; }
  .hero-title { font-size:1.1rem; font-weight:700; margin-bottom:4px; }
  .hero-sub { font-size:0.78rem; opacity:0.85; }

  /* 振り返り記録フォーム */
  .review-form { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:16px; }
  .prev-review { font-size:0.78rem; color:var(--text-soft); margin-bottom:14px; padding:8px 12px; background:var(--accent-soft); border-radius:8px; }
  .score-row-input { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .score-big { font-size:2.5rem; font-weight:800; color:var(--accent); min-width:52px; text-align:center; line-height:1; }
  .range-wrap { flex:1; }
  input[type="range"] {
    -webkit-appearance:none; width:100%; height:6px;
    border-radius:3px; background:var(--accent-soft); outline:none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none; width:22px; height:22px;
    border-radius:50%; background:var(--accent); cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,0.15);
  }
  .btn-record { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; }
  .record-saved { font-size:0.78rem; color:var(--accent); text-align:center; margin-top:8px; min-height:1.2em; }

  /* 振り返り履歴 */
  .review-hist-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-bottom:1px solid var(--border);
  }
  .review-hist-item:last-child { border-bottom:none; }
  .review-hist-date { font-size:0.85rem; font-weight:600; color:var(--text); min-width:80px; }
  .review-hist-bar-wrap { flex:1; height:5px; background:var(--accent-soft); border-radius:3px; overflow:hidden; }
  .review-hist-bar { height:100%; background:var(--accent); border-radius:3px; }
  .review-hist-score { font-size:0.9rem; font-weight:700; color:var(--accent); min-width:34px; text-align:right; }

  .section-label { font-size:0.68rem; font-weight:600; color:var(--text-soft); letter-spacing:0.08em; text-transform:uppercase; margin:18px 0 8px 2px; }
  .nav-cards { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  a.nav-card { display:block; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px 18px; text-decoration:none; color:var(--text); transition:border-color 0.15s; }
  a.nav-card:hover { border-color:var(--accent); }
  .nav-card-title { font-size:0.95rem; font-weight:600; margin-bottom:2px; }
  .nav-card-desc { font-size:0.78rem; color:var(--text-soft); }

  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-cat {
    font-size: 0.65rem; font-weight: 700; color: var(--accent);
    background: var(--accent-soft); border-radius: 8px;
    padding: 2px 8px; flex-shrink: 0; margin-top: 2px;
    white-space: nowrap;
  }
  .task-title { font-size: 0.88rem; color: var(--text); flex: 1; }
  .task-memo { font-size: 0.75rem; color: var(--text-soft); margin-top: 2px; }
  .task-empty { font-size: 0.82rem; color: var(--text-soft); text-align: center; padding: 16px 0; }
  .empty { text-align:center; color:var(--text-soft); font-size:0.85rem; padding:20px 0; }
  .updated { font-size:0.72rem; color:var(--text-soft); margin-top:32px; text-align:right; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>

  <div class="hero">
    <div class="hero-icon">🔁</div>
    <div class="hero-title">振り返り</div>
    <div class="hero-sub" id="heroDate"></div>
  </div>

  <!-- 振り返り記録フォーム -->
  <div class="review-form">
    <div class="prev-review" id="prevReview">前回の振り返り日を確認中...</div>
    <div class="score-row-input">
      <div class="score-big" id="reviewScoreNum">50</div>
      <div class="range-wrap">
        <input type="range" id="reviewSlider" min="0" max="100" value="50">
      </div>
    </div>
    <button class="btn-record" id="btnRecord">📝 振り返りを記録する</button>
    <div class="record-saved" id="recordSaved"></div>
  </div>

  <!-- 振り返り履歴 -->
  <div class="section-label">振り返り履歴</div>
  <div class="section" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;">
    <div id="reviewHistList"></div>
    <p class="empty" id="reviewHistEmpty" style="display:none;">まだ記録がありません</p>
  </div>

  <!-- タスク一覧 -->
  <div class="section-label">やること・気になること</div>
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;">
    <div id="taskList"></div>
    <p class="task-empty" id="taskEmpty" style="display:none;">タスクはまだありません</p>
  </div>

  <!-- ここから始める -->
  <div class="section-label">ここから始める</div>
  <div class="nav-cards">
    <a class="nav-card" href="../m2/">
      <div class="nav-card-title">m2 — 今日の記録</div>
      <div class="nav-card-desc">スコアを入れて、次回振り返り日を設定する</div>
    </a>
    <a class="nav-card" href="../m1/">
      <div class="nav-card-title">m1 — 記録一覧</div>
      <div class="nav-card-desc">過去のスコア・訪問記録を振り返る</div>
    </a>
  </div>

  <p class="updated">更新: 2026-06-28 10:29</p>
</div>

<script type="module">
import { db } from "../lib/firebase.js";
import { collection, getDocs, doc, setDoc, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const REVIEW_COL = "ab_reviews";
  const TASK_COL = "ab_tasks";
const DOW = ["日","月","火","水","木","金","土"];

const today = new Date().toLocaleDateString("sv-SE");
const todayDisp = new Date().toLocaleDateString("ja-JP", { month:"long", day:"numeric", weekday:"short" });
document.getElementById("heroDate").textContent = todayDisp;

// スライダー連動
const slider = document.getElementById("reviewSlider");
const scoreNum = document.getElementById("reviewScoreNum");
slider.addEventListener("input", () => { scoreNum.textContent = slider.value; });

// 振り返り履歴を読み込む
async function loadReviews() {
  const snap = await getDocs(collection(db, REVIEW_COL));
  const rows = [];
  snap.forEach(d => rows.push(d.data()));
  rows.sort((a, b) => b.date.localeCompare(a.date));

  // 前回の振り返り日
  const prevEl = document.getElementById("prevReview");
  const past = rows.filter(r => r.date < today);
  if (past.length > 0) {
    const [y, m, d2] = past[0].date.split("-");
    prevEl.textContent = `前回の振り返り: ${parseInt(m)}/${parseInt(d2)}（スコア ${past[0].score ?? "—"}）`;
  } else {
    prevEl.textContent = "前回の振り返り記録はありません";
  }

  // 今日すでに記録があればスライダーに反映
  const todayRec = rows.find(r => r.date === today);
  if (todayRec) {
    slider.value = todayRec.score;
    scoreNum.textContent = todayRec.score;
    document.getElementById("btnRecord").textContent = "📝 更新する";
  }

  // 履歴一覧
  const listEl = document.getElementById("reviewHistList");
  const emptyEl = document.getElementById("reviewHistEmpty");
  if (rows.length === 0) {
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";
  listEl.innerHTML = "";
  rows.forEach(r => {
    const [y, m, d2] = r.date.split("-");
    const dow = DOW[new Date(r.date).getDay()];
    const label = `${parseInt(m)}/${parseInt(d2)}（${dow}）`;
    const score = r.score ?? 0;
    const row = document.createElement("div");
    row.className = "review-hist-item";
    row.innerHTML = `
      <span class="review-hist-date">${label}</span>
      <div class="review-hist-bar-wrap"><div class="review-hist-bar" style="width:${score}%"></div></div>
      <span class="review-hist-score">${score}</span>
    `;
    listEl.appendChild(row);
  });
}

// タスク一覧を読み込む
  async function loadTasks() {
    const listEl  = document.getElementById("taskList");
    const emptyEl = document.getElementById("taskEmpty");
    try {
      const snap = await getDocs(collection(db, TASK_COL));
      if (snap.size === 0) {
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";
      listEl.innerHTML = "";
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      // カテゴリ順、同カテゴリ内はcreatedAt順
      items.sort((a, b) => {
        if ((a.col2 || "") !== (b.col2 || "")) return (a.col2||"").localeCompare(b.col2||"");
        return (a.createdAt||"").localeCompare(b.createdAt||"");
      });
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "task-item";
        div.innerHTML = `
          ${item.col2 ? `<span class="task-cat">${item.col2}</span>` : ""}
          <div>
            <div class="task-title">${item.col1 || "—"}</div>
            ${item.col3 ? `<div class="task-memo">${item.col3}</div>` : ""}
          </div>
        `;
        listEl.appendChild(div);
      });
    } catch(e) {
      emptyEl.style.display = "block";
      emptyEl.textContent = "読み込みエラー";
    }
  }

  // 振り返りを記録
document.getElementById("btnRecord").addEventListener("click", async () => {
  const score = Number(slider.value);
  const savedEl = document.getElementById("recordSaved");
  const btn = document.getElementById("btnRecord");
  btn.disabled = true;
  try {
    await setDoc(doc(db, REVIEW_COL, today), {
      date: today, score, createdAt: new Date().toISOString()
    });
    savedEl.textContent = "✓ 記録しました（スコア " + score + "）";
    btn.textContent = "📝 更新する";
    loadReviews();
  } catch(e) {
    savedEl.textContent = "エラー: " + e.message;
  }
  btn.disabled = false;
});

loadReviews();
  loadTasks();
</script>
</body>
</html>
