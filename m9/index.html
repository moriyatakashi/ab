<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m9 / 振り返り</title>
<link rel="stylesheet" href="../style.css">
<style>

  .hero { background:var(--accent); color:#fff; border-radius:14px; padding:20px 18px; margin-bottom:16px; text-align:center; }
  .hero-icon { font-size:2rem; margin-bottom:6px; }
  .hero-title { font-size:1.1rem; font-weight:700; margin-bottom:4px; }
  .hero-sub { font-size:0.78rem; opacity:0.85; }

  /* 振り返り記録フォーム */
  .review-form { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:16px; }
  .prev-review { font-size:0.78rem; color:var(--text-soft); margin-bottom:14px; padding:8px 12px; background:var(--accent-soft); border-radius:8px; }
  .score-row-input { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .score-big { font-size:2.5rem; font-weight:800; color:var(--accent); min-width:52px; text-align:center; line-height:1; }
  .range-wrap { flex:1; }
  input[type="range"] {
    -webkit-appearance:none; width:100%; height:6px;
    border-radius:3px; background:var(--accent-soft); outline:none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance:none; width:22px; height:22px;
    border-radius:50%; background:var(--accent); cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,0.15);
  }
  .btn-record { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; }
  .record-saved { font-size:0.78rem; color:var(--accent); text-align:center; margin-top:8px; min-height:1.2em; }

  /* 振り返り履歴 */
  .review-hist-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-bottom:1px solid var(--border);
  }
  .review-hist-item:last-child { border-bottom:none; }
  .review-hist-date { font-size:0.85rem; font-weight:600; color:var(--text); min-width:80px; }
  .review-hist-bar-wrap { flex:1; height:5px; background:var(--accent-soft); border-radius:3px; overflow:hidden; }
  .review-hist-bar { height:100%; background:var(--accent); border-radius:3px; }
  .review-hist-score { font-size:0.9rem; font-weight:700; color:var(--accent); min-width:34px; text-align:right; }

  .section-label { font-size:0.68rem; font-weight:600; color:var(--text-soft); letter-spacing:0.08em; text-transform:uppercase; margin:18px 0 8px 2px; }
  .nav-cards { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  a.nav-card { display:block; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px 18px; text-decoration:none; color:var(--text); transition:border-color 0.15s; }
  a.nav-card:hover { border-color:var(--accent); }
  .nav-card-title { font-size:0.95rem; font-weight:600; margin-bottom:2px; }
  .nav-card-desc { font-size:0.78rem; color:var(--text-soft); }

  .task-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-cat {
    font-size: 0.65rem; font-weight: 700; color: var(--accent);
    background: var(--accent-soft); border-radius: 8px;
    padding: 2px 8px; flex-shrink: 0; margin-top: 2px;
    white-space: nowrap;
  }
  .task-title { font-size: 0.88rem; color: var(--text); flex: 1; }
  .task-memo { font-size: 0.75rem; color: var(--text-soft); margin-top: 2px; }
  .task-item { display:flex; align-items:flex-start; gap:8px; padding:10px 0; border-bottom:1px solid var(--border); }
  .task-item:last-child { border-bottom:none; }
  .task-item-body { flex:1; min-width:0; }
  .task-cat { font-size:0.65rem; font-weight:700; color:var(--accent); background:var(--accent-soft); border-radius:8px; padding:2px 8px; display:inline-block; margin-bottom:4px; }
  .task-title-text { font-size:0.88rem; color:var(--text); }
  .task-edit-area { display:none; flex-direction:column; gap:6px; margin-top:6px; }
  .task-edit-area.show { display:flex; }
  .task-edit-input { padding:7px 10px; border:1px solid var(--border); border-radius:8px; font-size:0.85rem; background:var(--bg); color:var(--text); }
  .task-edit-input:focus { outline:none; border-color:var(--accent); }
  .task-edit-row { display:flex; gap:6px; }
  .task-btn { font-size:0.72rem; padding:4px 10px; border-radius:6px; cursor:pointer; border:1px solid; white-space:nowrap; }
  .task-btn-edit   { background:var(--panel); border-color:var(--border); color:var(--text-soft); }
  .task-btn-save   { background:var(--accent); border-color:var(--accent); color:#fff; }
  .task-btn-cancel { background:var(--panel); border-color:var(--border); color:var(--text-soft); }
  .task-btn-del    { background:#fdf0f0; border-color:#f5c6c6; color:#b34444; }
  .task-actions { display:flex; gap:4px; flex-shrink:0; margin-top:2px; }
  .task-add-form { display:flex; flex-direction:column; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .task-add-row { display:flex; gap:8px; }
  .task-add-input { flex:1; padding:9px 10px; border:1px solid var(--border); border-radius:8px; font-size:0.85rem; background:var(--bg); color:var(--text); }
  .task-add-input:focus { outline:none; border-color:var(--accent); }
  .task-add-btn { padding:9px 16px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; white-space:nowrap; }
  .task-empty { font-size: 0.82rem; color: var(--text-soft); text-align: center; padding: 16px 0; }
  .next-review-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .next-review-label { font-size: 0.75rem; color: var(--text-soft); flex-shrink: 0; }
  .next-review-input {
    flex: 1; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.85rem; background: var(--bg); color: var(--text);
  }
  .next-review-input:focus { outline: none; border-color: var(--accent); }
  .next-review-saved { font-size: 0.72rem; color: var(--accent); flex-shrink: 0; min-width: 1.5em; }
  .empty { text-align:center; color:var(--text-soft); font-size:0.85rem; padding:20px 0; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>

  <div class="hero">
    <div class="hero-icon">🔁</div>
    <div class="hero-title">振り返り</div>
    <div class="hero-sub" id="heroDate"></div>
  </div>

  <!-- 振り返り記録フォーム -->
  <div class="review-form">
    <div class="prev-review" id="prevReview">前回の振り返り日を確認中...</div>
    <div class="score-row-input">
      <div class="score-big" id="reviewScoreNum">50</div>
      <div class="range-wrap">
        <input type="range" id="reviewSlider" min="0" max="100" value="50">
      </div>
    </div>
    <button class="btn-record" id="btnRecord">📝 振り返りを記録する</button>
    <div class="record-saved" id="recordSaved"></div>
    <div class="next-review-row">
      <span class="next-review-label">次回振り返り日</span>
      <input class="next-review-input" type="date" id="nextReviewDate">
      <span class="next-review-saved" id="nextReviewSaved"></span>
    </div>
  </div>

  <!-- 振り返り履歴 -->
  <div class="section-label">振り返り履歴</div>
  <div class="section" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;">
    <div id="reviewHistList"></div>
    <p class="empty" id="reviewHistEmpty" style="display:none;">まだ記録がありません</p>
  </div>

  <!-- タスク一覧 -->
  <div class="section-label">やること・気になること</div>
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;">
    <div id="taskList"></div>
    <p class="task-empty" id="taskEmpty" style="display:none;">タスクはまだありません</p>
  </div>

  <!-- ここから始める -->
  <div class="section-label">ここから始める</div>
  <div class="nav-cards">
    <a class="nav-card" href="../m2/">
      <div class="nav-card-title">m2 — 今日の記録</div>
      <div class="nav-card-desc">スコアを入れて、次回振り返り日を設定する</div>
    </a>
    <a class="nav-card" href="../m1/">
      <div class="nav-card-title">m1 — 記録一覧</div>
      <div class="nav-card-desc">過去のスコア・訪問記録を振り返る</div>
    </a>
  </div>

  <p class="updated">更新: 2026-07-02 06:10</p>
</div>

<script type="module">
import { db } from "../lib/firebase.js";
import { todayStr } from "../lib/date.js";
import { collection, getDocs, doc, setDoc, getDoc, updateDoc, deleteDoc, orderBy, query, addDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const REVIEW_COL = "ab_reviews";
  const TASK_COL = "ab_tasks";
const DOW = ["日","月","火","水","木","金","土"];

const today = todayStr();
const todayDisp = new Date().toLocaleDateString("ja-JP", { month:"long", day:"numeric", weekday:"short" });
document.getElementById("heroDate").textContent = todayDisp;

// スライダー連動
const slider = document.getElementById("reviewSlider");
const scoreNum = document.getElementById("reviewScoreNum");
slider.addEventListener("input", () => { scoreNum.textContent = slider.value; });

// 振り返り履歴を読み込む
async function loadReviews() {
  const snap = await getDocs(collection(db, REVIEW_COL));
  const rows = [];
  snap.forEach(d => rows.push(d.data()));
  rows.sort((a, b) => b.date.localeCompare(a.date));

  // 前回の振り返り日
  const prevEl = document.getElementById("prevReview");
  const past = rows.filter(r => r.date < today);
  if (past.length > 0) {
    const [y, m, d2] = past[0].date.split("-");
    prevEl.textContent = `前回の振り返り: ${parseInt(m)}/${parseInt(d2)}（スコア ${past[0].score ?? "—"}）`;
  } else {
    prevEl.textContent = "前回の振り返り記録はありません";
  }

  // 今日すでに記録があればスライダーに反映
  const todayRec = rows.find(r => r.date === today);
  if (todayRec) {
    slider.value = todayRec.score;
    scoreNum.textContent = todayRec.score;
    document.getElementById("btnRecord").textContent = "📝 更新する";
  }

  // 履歴一覧
  const listEl = document.getElementById("reviewHistList");
  const emptyEl = document.getElementById("reviewHistEmpty");
  if (rows.length === 0) {
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";
  listEl.innerHTML = "";
  rows.forEach(r => {
    const [y, m, d2] = r.date.split("-");
    const dow = DOW[new Date(r.date).getDay()];
    const label = `${parseInt(m)}/${parseInt(d2)}（${dow}）`;
    const score = r.score ?? 0;
    const row = document.createElement("div");
    row.className = "review-hist-item";
    row.innerHTML = `
      <span class="review-hist-date">${label}</span>
      <div class="review-hist-bar-wrap"><div class="review-hist-bar" style="width:${score}%"></div></div>
      <span class="review-hist-score">${score}</span>
    `;
    listEl.appendChild(row);
  });
}

// タスク一覧を読み込む
  async function loadTasks() {
    const listEl  = document.getElementById("taskList");
    const emptyEl = document.getElementById("taskEmpty");
    try {
      const snap = await getDocs(collection(db, TASK_COL));
      listEl.innerHTML = "";

      if (snap.size === 0) {
        emptyEl.style.display = "block";
      } else {
        emptyEl.style.display = "none";
        const items = [];
        snap.forEach(d => items.push({ id: d.id, ...d.data() }));
        items.sort((a, b) => {
          if ((a.col2||"") !== (b.col2||"")) return (a.col2||"").localeCompare(b.col2||"");
          return (a.createdAt||"").localeCompare(b.createdAt||"");
        });
        items.forEach(item => {
          const div = document.createElement("div");
          div.className = "task-item";
          div.innerHTML = `
            <div class="task-item-body">
              ${item.col2 ? `<span class="task-cat">${item.col2}</span>` : ""}
              <div class="task-title-text">${item.col1 || "—"}</div>
              <div class="task-edit-area" id="edit-${item.id}">
                <input class="task-edit-input" id="et-${item.id}" type="text" value="${(item.col1||"").replace(/"/g,"&quot;")}">
                <input class="task-edit-input" id="ec-${item.id}" type="text" value="${(item.col2||"").replace(/"/g,"&quot;")}" placeholder="カテゴリ">
                <div class="task-edit-row">
                  <button class="task-btn task-btn-save" data-id="${item.id}">保存</button>
                  <button class="task-btn task-btn-cancel" data-id="${item.id}">キャンセル</button>
                </div>
              </div>
            </div>
            <div class="task-actions">
              <button class="task-btn task-btn-edit" data-id="${item.id}">編集</button>
              <button class="task-btn task-btn-del" data-id="${item.id}">強制削除</button>
            </div>
          `;

          div.querySelector(".task-btn-edit").addEventListener("click", () => {
            document.getElementById(`edit-${item.id}`).classList.toggle("show");
          });
          div.querySelector(".task-btn-save").addEventListener("click", async () => {
            const t = document.getElementById(`et-${item.id}`).value.trim();
            const c = document.getElementById(`ec-${item.id}`).value.trim();
            if (!t) return;
            await updateDoc(doc(db, TASK_COL, item.id), { col1: t, col2: c });
            loadTasks();
          });
          div.querySelector(".task-btn-cancel").addEventListener("click", () => {
            document.getElementById(`edit-${item.id}`).classList.remove("show");
          });
          div.querySelector(".task-btn-del").addEventListener("click", async () => {
            if (!confirm(`「${item.col1}」を強制削除しますか？`)) return;
            await deleteDoc(doc(db, TASK_COL, item.id));
            loadTasks();
          });

          listEl.appendChild(div);
        });
      }

      // 追加フォーム
      const form = document.createElement("div");
      form.className = "task-add-form";
      form.innerHTML = `
        <div class="task-add-row">
          <input class="task-add-input" id="newTaskTitle" type="text" placeholder="タスクを追加">
          <input class="task-add-input" id="newTaskCat" type="text" placeholder="カテゴリ" style="max-width:90px;">
        </div>
        <button class="task-add-btn" id="btnAddTask">＋ 追加</button>
      `;
      listEl.appendChild(form);

      document.getElementById("btnAddTask").addEventListener("click", async () => {
        const title = document.getElementById("newTaskTitle").value.trim();
        const cat   = document.getElementById("newTaskCat").value.trim();
        if (!title) { document.getElementById("newTaskTitle").focus(); return; }
        await addDoc(collection(db, TASK_COL), {
          col1: title, col2: cat, col3: "", createdAt: new Date().toISOString()
        });
        loadTasks();
      });

    } catch(e) {
      emptyEl.style.display = "block";
      emptyEl.textContent = "読み込みエラー";
    }
  }

  
  async function loadNextReview() {
    try {
      const todayKey = todayStr();
      const d = await getDoc(doc(db, "ab_checks", todayKey));
      if (d.exists() && d.data().reviewDate) {
        document.getElementById("nextReviewDate").value = d.data().reviewDate;
      }
    } catch(e) { console.warn("loadNextReview failed:", e); }
  }

  // 次回振り返り日を保存（ab_checksに書く）
  document.getElementById("nextReviewDate").addEventListener("change", async () => {
    const todayKey = todayStr();
    const reviewDate = document.getElementById("nextReviewDate").value;
    const savedEl = document.getElementById("nextReviewSaved");
    try {
      // ab_checksの今日のドキュメントにreviewDateをmerge
      await setDoc(doc(db, "ab_checks", todayKey), {
        date: todayKey,
        reviewDate: reviewDate || null,
        updatedAt: new Date().toISOString()
      }, { merge: true });
      savedEl.textContent = "✓";
      setTimeout(() => savedEl.textContent = "", 2000);
    } catch(e) { savedEl.textContent = "!"; }
  });

  // 振り返りを記録
document.getElementById("btnRecord").addEventListener("click", async () => {
  const score = Number(slider.value);
  const savedEl = document.getElementById("recordSaved");
  const btn = document.getElementById("btnRecord");
  btn.disabled = true;
  try {
    await setDoc(doc(db, REVIEW_COL, today), {
      date: today, score, createdAt: new Date().toISOString()
    });
    savedEl.textContent = "✓ 記録しました（スコア " + score + "）";
    btn.textContent = "📝 更新する";
    loadReviews();
  } catch(e) {
    savedEl.textContent = "エラー: " + e.message;
  }
  btn.disabled = false;
});

loadReviews();
  loadTasks();
  loadNextReview();
</script>
</body>
</html>
