<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ab</title>
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --border: #e2ded6;
    --text: #2b2b2b;
    --text-soft: #7a7568;
    --accent: #b5651d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 80px;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: 0.02em;
  }
  .sub {
    color: var(--text-soft);
    font-size: 0.85rem;
    margin: 0 0 28px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  a.link-card {
    display: block;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s ease, transform 0.1s ease;
  }
  a.link-card:hover {
    border-color: var(--accent);
  }
  a.link-card:active {
    transform: scale(0.99);
  }
  .link-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .link-desc {
    font-size: 0.8rem;
    color: var(--text-soft);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>ab</h1>
  <p class="sub">ページ一覧</p>
  <div class="links">
    <a class="link-card" href="newpage/">
      <div class="link-title">newpage</div>
      <div class="link-desc">3カラム管理ツール（ab_items）</div>
    </a>
    <a class="link-card" href="newpage2/">
      <div class="link-title">newpage2</div>
      <div class="link-desc">3カラム管理ツール（ab_items2）</div>
    </a>
  </div>
</div>
</body>
</html>
