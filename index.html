<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ab</title>
<style>
  :root { --bg:#f7f6f3; --panel:#ffffff; --border:#e2ded6; --text:#2b2b2b; --text-soft:#7a7568; --accent:#b5651d; --accent-soft:#f1e3d3; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; background:var(--bg); color:var(--text); padding:24px 16px 80px; }
  .wrap { max-width:480px; margin:0 auto; }
  h1 { font-size:1.4rem; font-weight:600; margin:0 0 4px; }
  .sub { color:var(--text-soft); font-size:0.85rem; margin:0 0 24px; }

  /* 振り返りバナー（今日が振り返り日のとき） */
  .review-banner {
    display:none; align-items:center; gap:14px;
    background:var(--accent); color:#fff; border-radius:12px;
    padding:16px 18px; text-decoration:none; margin-bottom:20px;
    transition:opacity 0.15s;
  }
  .review-banner:hover { opacity:0.88; }
  .review-banner-icon { font-size:1.6rem; flex-shrink:0; }
  .review-banner-title { font-size:0.95rem; font-weight:700; margin-bottom:2px; }
  .review-banner-sub { font-size:0.75rem; opacity:0.85; }

  /* カードグリッド */
  .cards { display:flex; flex-direction:column; gap:8px; }
  a.card {
    display:flex; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:16px 18px; text-decoration:none;
    color:var(--text); transition:border-color 0.15s;
  }
  a.card:hover { border-color:var(--accent); }
  .card-icon { font-size:1.4rem; flex-shrink:0; width:32px; text-align:center; }
  .card-body { flex:1; min-width:0; }
  .card-title { font-size:0.95rem; font-weight:600; margin-bottom:2px; }
  .card-desc { font-size:0.78rem; color:var(--text-soft); }
  .card-arrow { color:var(--border); font-size:1rem; flex-shrink:0; }

  .cat-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin: 18px 0 6px 4px;
  }
  .cat-label:first-child { margin-top: 0; }
  .updated { font-size:0.72rem; color:var(--text-soft); margin-top:32px; text-align:right; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ab</h1>
  <p class="sub">ページ一覧</p>

  <!-- 振り返りバナー -->
  <a class="review-banner" id="reviewBanner" href="m9/">
    <span class="review-banner-icon">🔁</span>
    <div>
      <div class="review-banner-title">今日は振り返りの日です</div>
      <div class="review-banner-sub">m9 振り返りページへ →</div>
    </div>
  </a>

  <!-- カード一覧（JS で生成） -->
  <div class="cards" id="cards"></div>

  <p class="updated">更新: 2026-07-02 05:38</p>
</div>

<script type="module">
// ── ページ定義（カテゴリ付き） ──────────────────────
const CATEGORIES = [
  {
    label: "記録する",
    pages: [
      { icon:"📝", title:"m2 — 今日の記録",  desc:"スコア・訪問・チェックを記録する。", href:"m2/" },
      { icon:"🔁", title:"m9 — 振り返り",    desc:"振り返りスコアを記録・履歴を確認。", href:"m9/" },
    ]
  },
  {
    label: "見る・振り返る",
    pages: [
      { icon:"📋", title:"m1 — 記録一覧",    desc:"スコア・訪問を日付でまとめて表示。", href:"m1/" },
      { icon:"📈", title:"m7 — 日次スコア",  desc:"日次スコアの折れ線グラフ。",         href:"m7/" },
      { icon:"🗺️", title:"m5 — 訪問地図",  desc:"訪問記録を地図にプロット。",          href:"m5/" },
    ]
  },
  {
    label: "ツール",
    pages: [
      { icon:"📅", title:"m10 — カレンダー", desc:"今月・来月のカレンダー。",            href:"m10/" },
      { icon:"⬠", title:"m11 — レーダーチャート", desc:"5軸の五角形レーダーチャート（デザイン検討中）。", href:"m11/" },
    ]
  },
  {
    label: "その他",
    pages: [
      { icon:"🎮", title:"遊ぶ",              desc:"ゲーム一覧（m6・m8・m4）。",         href:"play/" },
      { icon:"⚙️", title:"管理（m3ほか）",    desc:"m3 Firestoreビューア・テストほか。", href:"admin/" },
    ]
  },
];

// カテゴリ＋カード生成
const container = document.getElementById("cards");
CATEGORIES.forEach(cat => {
  const label = document.createElement("div");
  label.className = "cat-label";
  label.textContent = cat.label;
  container.appendChild(label);

  cat.pages.forEach(p => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = p.href;
    a.innerHTML = `
      <span class="card-icon">${p.icon}</span>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc}</div>
      </div>
      <span class="card-arrow">›</span>
    `;
    container.appendChild(a);
  });
});

// 振り返りバナー（今日が振り返り日かチェック）
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

try {
  const app = initializeApp({
    apiKey: "AIzaSyDuPw8nMuFWx8ghV5ZeBGETeiNII3uk4l8",
    authDomain: "ab01-9f35a.firebaseapp.com",
    projectId: "ab01-9f35a"
  });
  const db = getFirestore(app);
  const today = new Date().toLocaleDateString("sv-SE");

  const snap = await getDocs(collection(db, "ab_checks"));
  snap.forEach(d => {
    if (d.id === today && d.data().reviewDate === today) {
      document.getElementById("reviewBanner").style.display = "flex";
    }
  });
} catch(e) {}
</script>
</body>
</html>
