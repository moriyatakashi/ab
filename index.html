<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ab</title>
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --border: #e2ded6;
    --text: #2b2b2b;
    --text-soft: #7a7568;
    --accent: #b5651d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 80px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--text-soft); font-size: 0.85rem; margin: 0 0 28px; }
  .links { display: flex; flex-direction: column; gap: 10px; }
  a.link-card {
    display: block;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s ease;
  }
  a.link-card:hover { border-color: var(--accent); }
  .link-title { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
  .link-desc { font-size: 0.8rem; color: var(--text-soft); }
  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-soft);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 20px 0 8px 2px;
  }
  .updated { font-size: 0.72rem; color: var(--text-soft); margin-top: 32px; text-align: right; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ab</h1>
  <p class="sub">ページ一覧</p>
  <div class="links">
    <div class="section-label">データ管理</div>
    <a class="link-card" href="main/">
      <div class="link-title">main</div>
      <div class="link-desc">本番用 CRUD（ab_items2）</div>
    </a>
    <a class="link-card" href="sandbox/">
      <div class="link-title">sandbox</div>
      <div class="link-desc">実験用 CRUD（ab_sandbox）</div>
    </a>

    <div class="section-label">スコア</div>
    <a class="link-card" href="mm/">
      <div class="link-title">mm</div>
      <div class="link-desc">今日のスコアを入力（0〜100）</div>
    </a>
    <a class="link-card" href="m1/">
      <div class="link-title">m1</div>
      <div class="link-desc">スコア履歴・バーグラフ</div>
    </a>

    <div class="section-label">ツール・遊び</div>
    <a class="link-card" href="m3/">
      <div class="link-title">m3</div>
      <div class="link-desc">Firestoreビューア</div>
    </a>
    <a class="link-card" href="m4/">
      <div class="link-title">m4</div>
      <div class="link-desc">今日のトリビア（鉄道・地理・乗り物）</div>
    </a>
  </div>
  <div class="updated">更新: 2026-06-27 00:00</div>
</div>
</body>
</html>
