<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m5 / EXIFデバッグ</title>
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f7f6f3; }
  .zone {
    border: 2px dashed #b5651d; border-radius: 12px; padding: 28px;
    text-align: center; cursor: pointer; position: relative; margin-bottom: 16px;
  }
  .zone input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .btn-copy {
    background: #b5651d; color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 0.85rem; cursor: pointer;
  }
  .btn-copy:hover { opacity: 0.85; }
  pre { background: #fff; border: 1px solid #e2ded6; border-radius: 8px; padding: 12px; font-size: 0.75rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  a { font-size: 0.8rem; color: #7a7568; }
</style>
</head>
<body>
<a href="../m5/">← 本番m5に戻る</a>
<h2 style="margin:12px 0 16px;">EXIFデバッグ</h2>

<div class="zone">
  <input type="file" id="f" accept="image/*">
  📷 写真を選ぶ
</div>

<div class="toolbar">
  <button class="btn-copy" id="btnCopy" onclick="copyResult()">コピー</button>
</div>
<pre id="out">ここに結果が出ます</pre>

<script>
document.getElementById('f').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const out = document.getElementById('out');
  out.textContent = '解析中...';
  try {
    const all = await exifr.parse(file, true);
    out.textContent = JSON.stringify(all, null, 2);
  } catch(err) {
    out.textContent = 'エラー: ' + err.message;
  }
});

async function copyResult() {
  const text = document.getElementById('out').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = 'コピー', 2000);
  } catch(e) {
    alert('コピー失敗: ' + e.message);
  }
}
</script>
</body>
</html>
