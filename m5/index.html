<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m5 / 訪問記録</title>
<link rel="stylesheet" href="../style.css">
<!-- exifr: 実績ある EXIF パーサー -->
<script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:20px; }
  .back-link:hover { color:var(--accent); }

  .photo-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 16px;
    position: relative;
  }
  .photo-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
  .photo-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-icon { font-size: 2rem; margin-bottom: 6px; }
  .photo-label { font-size: 0.88rem; color: var(--text-soft); }
  .photo-sub { font-size: 0.72rem; color: var(--text-soft); margin-top: 4px; opacity: 0.7; }

  .exif-result {
    background: var(--accent-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.82rem;
    margin-bottom: 16px;
    display: none;
  }
  .exif-result.show { display: block; }
  .exif-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .exif-row:last-child { margin-bottom: 0; }
  .exif-key { color: var(--accent); font-weight: 600; width: 56px; flex-shrink: 0; }
  .exif-val { color: var(--text); word-break: break-all; }
  .geocoding-status { color: var(--accent); }

  .add-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .field-label { font-size: 0.7rem; font-weight: 600; color: var(--text-soft); margin-bottom: 2px; }
  .add-block input, .add-block textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; background: var(--bg); color: var(--text); font-family: inherit;
  }
  .add-block input:focus, .add-block textarea:focus { outline: none; border-color: var(--accent); }
  .add-block textarea { resize: none; height: 60px; }
  .coord-row { display: flex; gap: 8px; }
  .coord-row input { flex: 1; font-size: 0.8rem; color: var(--text-soft); }

  .btn-add {
    background: var(--accent); color: #fff;
    padding: 12px; font-size: 0.9rem; font-weight: 600;
    border-radius: 8px; border: none; cursor: pointer; width: 100%;
    transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.85; }

  .visit-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  }
  .visit-main { flex: 1; min-width: 0; }
  .visit-place { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
  .visit-date { font-size: 0.75rem; color: var(--accent); margin-bottom: 4px; }
  .visit-memo { font-size: 0.82rem; color: var(--text-soft); line-height: 1.5; }
  .visit-coord { font-size: 0.7rem; color: var(--text-soft); margin-top: 4px; opacity: 0.6; }
  .btn-del {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-soft); font-size: 0.75rem; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>
  <h1>訪問記録</h1>
  <p class="sub">写真を選ぶと撮影日時・場所を自動入力</p>

  <div class="photo-zone" id="photoZone">
    <input type="file" id="photoInput" accept="image/*">
    <div class="photo-icon">📷</div>
    <div class="photo-label">写真を選ぶ / タップ</div>
    <div class="photo-sub">EXIF情報だけ読みます。写真はどこにも送りません。</div>
  </div>

  <div class="exif-result" id="exifResult">
    <div class="exif-row"><span class="exif-key">日時</span><span class="exif-val" id="exifDate">—</span></div>
    <div class="exif-row"><span class="exif-key">座標</span><span class="exif-val" id="exifCoord">—</span></div>
    <div class="exif-row"><span class="exif-key">地名</span><span class="exif-val" id="exifPlace">—</span></div>
  </div>

  <div class="add-block">
    <div>
      <div class="field-label">場所名</div>
      <input type="text" id="placeInput" placeholder="例: 布施駅、道頓堀" maxlength="80">
    </div>
    <div>
      <div class="field-label">日付</div>
      <input type="date" id="dateInput">
    </div>
    <div>
      <div class="field-label">メモ（任意）</div>
      <textarea id="memoInput" placeholder="ひとこと"></textarea>
    </div>
    <div class="coord-row" id="coordRow" style="display:none;">
      <input type="text" id="latInput" placeholder="緯度" readonly>
      <input type="text" id="lngInput" placeholder="経度" readonly>
    </div>
    <button class="btn-add" id="btnAdd">追加</button>
  </div>

  <p class="status" id="status">読み込み中...</p>
  <div class="list" id="list"></div>
  <p class="empty" id="emptyMsg" style="display:none; text-align:center; color:var(--text-soft); font-size:0.85rem; padding:32px 0;">記録はまだありません</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDuPw8nMuFWx8ghV5ZeBGETeiNII3uk4l8",
    authDomain: "ab01-9f35a.firebaseapp.com",
    projectId: "ab01-9f35a"
  });
  const db = getFirestore(app);
  const COL = "ab_visits";

  // 今日の日付をデフォルト
  const today = new Date();
  document.getElementById("dateInput").value =
    today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");

  // ── Nominatim Reverse Geocoding ──
  async function reverseGeocode(lat, lng) {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`;
    const res = await fetch(url, { headers: { "User-Agent": "ab-roreki/1.0" } });
    if (!res.ok) throw new Error("Geocoding失敗");
    const data = await res.json();
    const a = data.address || {};
    const place = [
      a.city || a.town || a.village || a.county || "",
      a.suburb || a.neighbourhood || a.quarter || ""
    ].filter(Boolean).join(" ") || data.display_name?.split(",")[0] || "";
    return place;
  }

  // ── 写真選択 → exifr で解析 ──
  document.getElementById("photoInput").addEventListener("change", async e => {
    const file = e.target.files[0];
    if (!file) return;

    const result = document.getElementById("exifResult");
    result.classList.add("show");
    document.getElementById("exifDate").textContent = "解析中...";
    document.getElementById("exifCoord").textContent = "解析中...";
    document.getElementById("exifPlace").innerHTML = '<span class="geocoding-status">解析中...</span>';

    try {
      // exifr で全タグ取得
      const exif = await exifr.parse(file, {
        tiff: true, exif: true, gps: true, ifd1: false
      });

      if (!exif) {
        document.getElementById("exifDate").textContent = "EXIFなし";
        document.getElementById("exifCoord").textContent = "EXIFなし";
        document.getElementById("exifPlace").textContent = "取得不可";
        return;
      }

      // 日時
      const dt = exif.DateTimeOriginal || exif.DateTime || exif.CreateDate;
      if (dt) {
        document.getElementById("exifDate").textContent = dt.toLocaleString("ja-JP");
        const d = new Date(dt);
        document.getElementById("dateInput").value =
          d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      } else {
        document.getElementById("exifDate").textContent = "日時情報なし";
      }

      // GPS
      const lat = exif.latitude  ?? exif.GPSLatitude;
      const lng = exif.longitude ?? exif.GPSLongitude;

      if (lat != null && lng != null) {
        const latR = Math.round(lat * 100000) / 100000;
        const lngR = Math.round(lng * 100000) / 100000;
        document.getElementById("exifCoord").textContent = `${latR}, ${lngR}`;
        document.getElementById("latInput").value = latR;
        document.getElementById("lngInput").value = lngR;
        document.getElementById("coordRow").style.display = "flex";

        document.getElementById("exifPlace").innerHTML = '<span class="geocoding-status">地名取得中...</span>';
        try {
          const place = await reverseGeocode(lat, lng);
          document.getElementById("exifPlace").textContent = place || "地名取得失敗";
          if (place) document.getElementById("placeInput").value = place;
        } catch(err) {
          document.getElementById("exifPlace").textContent = "地名取得失敗: " + err.message;
        }
      } else {
        document.getElementById("exifCoord").textContent = "GPS情報なし";
        document.getElementById("exifPlace").textContent = "GPS情報なし";
      }

    } catch(err) {
      document.getElementById("exifDate").textContent = "解析エラー: " + err.message;
      document.getElementById("exifCoord").textContent = "—";
      document.getElementById("exifPlace").textContent = "—";
    }
  });

  // ── 一覧 ──
  function formatDate(s) {
    const [y,m,d] = s.split("-");
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }

  function renderItem(id, data) {
    const div = document.createElement("div");
    div.className = "visit-item";
    div.innerHTML = `
      <div class="visit-main">
        <div class="visit-place">${data.place}</div>
        <div class="visit-date">${formatDate(data.date)}</div>
        ${data.memo ? `<div class="visit-memo">${data.memo}</div>` : ""}
        ${data.lat ? `<div class="visit-coord">📍 ${data.lat}, ${data.lng}</div>` : ""}
      </div>
      <button class="btn-del" onclick="del('${id}', this)">削除</button>
    `;
    return div;
  }

  async function load() {
    try {
      const q = query(collection(db, COL), orderBy("date","desc"));
      const snap = await getDocs(q);
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (snap.empty) {
        document.getElementById("emptyMsg").style.display = "block";
        document.getElementById("status").textContent = "0件";
        return;
      }
      document.getElementById("emptyMsg").style.display = "none";
      snap.forEach(d => list.appendChild(renderItem(d.id, d.data())));
      document.getElementById("status").textContent = `${snap.size}件`;
    } catch(e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  }

  document.getElementById("btnAdd").addEventListener("click", async () => {
    const place = document.getElementById("placeInput").value.trim();
    const date  = document.getElementById("dateInput").value;
    const memo  = document.getElementById("memoInput").value.trim();
    const lat   = document.getElementById("latInput").value;
    const lng   = document.getElementById("lngInput").value;
    if (!place) { document.getElementById("status").textContent = "場所名を入力してください"; return; }
    if (!date)  { document.getElementById("status").textContent = "日付を選んでください"; return; }
    document.getElementById("status").textContent = "追加中...";
    try {
      await addDoc(collection(db, COL), {
        place, date, memo,
        lat: lat ? Number(lat) : null,
        lng: lng ? Number(lng) : null,
        createdAt: new Date().toISOString()
      });
      document.getElementById("placeInput").value = "";
      document.getElementById("memoInput").value = "";
      document.getElementById("latInput").value = "";
      document.getElementById("lngInput").value = "";
      document.getElementById("coordRow").style.display = "none";
      document.getElementById("exifResult").classList.remove("show");
      document.getElementById("photoInput").value = "";
      document.getElementById("status").textContent = "追加しました ✓";
      await load();
    } catch(e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  });

  window.del = async (id, btn) => {
    if (!confirm("この記録を削除しますか？")) return;
    try {
      await deleteDoc(doc(db, COL, id));
      btn.closest(".visit-item").remove();
      const rem = document.getElementById("list").children.length;
      document.getElementById("status").textContent = `${rem}件`;
      if (rem === 0) document.getElementById("emptyMsg").style.display = "block";
    } catch(e) { alert("削除エラー: " + e.message); }
  };

  load();
</script>
</body>
</html>
