<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m5 / 訪問地図</title>
<link rel="stylesheet" href="../style.css">
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:16px; }
  .back-link:hover { color:var(--accent); }

  .map-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 16px;
    position: relative;
  }
  #mapCanvas { display:block; width:100%; touch-action:none; }

  .map-legend {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 10px 14px; border-top: 1px solid var(--border);
    font-size: 0.72rem; color: var(--text-soft);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .stats {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
    display: flex; gap: 20px;
  }
  .stat-item { text-align: center; }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.7rem; color: var(--text-soft); margin-top: 2px; }

  .section-label { font-size:0.68rem; font-weight:600; color:var(--text-soft); letter-spacing:0.08em; text-transform:uppercase; margin:16px 0 8px 2px; }

  .visit-list { display: flex; flex-direction: column; gap: 6px; }
  .visit-row {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; gap: 10px; align-items: flex-start;
    cursor: pointer; transition: border-color 0.15s;
  }
  .visit-row:hover, .visit-row.active { border-color: var(--accent); }
  .visit-row-icon { color: var(--accent); flex-shrink: 0; font-size: 1rem; margin-top: 1px; }
  .visit-row-body { flex: 1; min-width: 0; }
  .visit-row-place { font-size: 0.88rem; font-weight: 600; }
  .visit-row-meta { font-size: 0.72rem; color: var(--text-soft); margin-top: 2px; }

  .empty { text-align: center; color: var(--text-soft); font-size: 0.85rem; padding: 20px 0; }
  .updated { font-size:0.72rem; color:var(--text-soft); margin-top:32px; text-align:right; }

  /* ポップアップ */
  .popup {
    display: none; position: absolute; background: #fff;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 0.82rem; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    pointer-events: none; z-index: 10; max-width: 180px;
  }
  .popup.show { display: block; }
  .popup-place { font-weight: 700; margin-bottom: 3px; }
  .popup-meta { color: var(--text-soft); font-size: 0.72rem; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>
  <h1>訪問地図</h1>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">訪問件数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statPlaces">—</div>
      <div class="stat-label">場所数</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statDays">—</div>
      <div class="stat-label">訪問日数</div>
    </div>
  </div>

  <div class="map-wrap">
    <canvas id="mapCanvas" height="360"></canvas>
    <div class="popup" id="popup">
      <div class="popup-place" id="popupPlace"></div>
      <div class="popup-meta" id="popupMeta"></div>
    </div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#dce8f5;border:1px solid #aac4e0;"></div>東大阪市</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8f0e0;border:1px solid #a8c890;"></div>大阪市</div>
      <div class="legend-item"><div class="legend-dot" style="background:#b5651d;"></div>訪問ポイント</div>
    </div>
  </div>

  <div class="section-label">訪問記録（緯度経度あり）</div>
  <div class="visit-list" id="visitList"></div>
  <p class="empty" id="emptyMsg" style="display:none;">緯度経度のある訪問記録がありません</p>

  <p class="updated">更新: 2026-06-28 12:30</p>
</div>

<script type="module">
import { db } from "../lib/firebase.js";
import { collection, getDocs, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const canvas  = document.getElementById("mapCanvas");
const ctx     = canvas.getContext("2d");
const popup   = document.getElementById("popup");

// GeoJSONを読み込む
async function fetchGeo(path) {
  const r = await fetch(path);
  return r.json();
}

// 座標→キャンバス変換
function makeProjector(features, W, H, padding = 20) {
  let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
  features.forEach(f => {
    const geom = f.geometry;
    const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    polys.forEach(poly => poly.forEach(ring => ring.forEach(([lng, lat]) => {
      if (lng < minLng) minLng = lng;
      if (lng > maxLng) maxLng = lng;
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
    })));
  });
  const scaleX = (W - padding * 2) / (maxLng - minLng);
  const scaleY = (H - padding * 2) / (maxLat - minLat);
  const scale  = Math.min(scaleX, scaleY);
  const offX   = padding + (W - padding * 2 - (maxLng - minLng) * scale) / 2;
  const offY   = padding + (H - padding * 2 - (maxLat - minLat) * scale) / 2;
  return (lng, lat) => [
    offX + (lng - minLng) * scale,
    H - offY - (lat - minLat) * scale
  ];
}

// ポリゴンを描画
function drawFeatures(features, proj, fillColor, strokeColor) {
  features.forEach(f => {
    const geom = f.geometry;
    const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    polys.forEach(poly => {
      ctx.beginPath();
      poly.forEach(ring => {
        ring.forEach(([lng, lat], i) => {
          const [x, y] = proj(lng, lat);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.closePath();
      });
      ctx.fillStyle   = fillColor;
      ctx.strokeStyle = strokeColor;
      ctx.lineWidth   = 1;
      ctx.fill();
      ctx.stroke();
    });
  });
}

// ポイントを描画して当たり判定用リストを返す
function drawPoints(visits, proj) {
  const points = [];
  visits.forEach(v => {
    const [x, y] = proj(v.lng, v.lat);
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle   = "#b5651d";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth   = 2;
    ctx.fill();
    ctx.stroke();
    points.push({ x, y, v });
  });
  return points;
}

async function main() {
  // GeoJSONとFirestoreを並行取得
  const [higashiGeo, osakaCityGeo, visitSnap] = await Promise.all([
    fetchGeo("../geo/higashiosaka.geojson"),
    fetchGeo("../geo/osaka_city.geojson"),
    getDocs(query(collection(db, "ab_visits"), orderBy("createdAt", "desc")))
  ]);

  const allVisits = [];
  visitSnap.forEach(d => allVisits.push({ id: d.id, ...d.data() }));
  const withLatLng = allVisits.filter(v => v.lat && v.lng);

  // 統計
  document.getElementById("statTotal").textContent  = allVisits.length;
  document.getElementById("statPlaces").textContent = new Set(allVisits.map(v => v.place).filter(Boolean)).size;
  document.getElementById("statDays").textContent   = new Set(allVisits.map(v => v.date).filter(Boolean)).size;

  // キャンバスサイズ
  const W = canvas.offsetWidth;
  const H = 360;
  canvas.width  = W;
  canvas.height = H;

  // 全featureをまとめてプロジェクタを作成（統一座標系）
  const allFeatures = [...higashiGeo.features, ...osakaCityGeo.features];
  const proj = makeProjector(allFeatures, W, H);

  // 描画
  ctx.clearRect(0, 0, W, H);
  drawFeatures(osakaCityGeo.features,  proj, "#e8f0e0", "#a8c890");
  drawFeatures(higashiGeo.features,    proj, "#dce8f5", "#aac4e0");
  const points = withLatLng.length > 0 ? drawPoints(withLatLng, proj) : [];

  // タップ/クリックでポップアップ
  canvas.addEventListener("click", e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top)  * (H / rect.height);
    let hit = null;
    for (const pt of points) {
      if (Math.hypot(mx - pt.x, my - pt.y) < 12) { hit = pt; break; }
    }
    if (hit) {
      const v = hit.v;
      document.getElementById("popupPlace").textContent = v.place || "—";
      document.getElementById("popupMeta").textContent  = `${v.date || ""} ${v.time || ""}${v.memo ? "\n" + v.memo : ""}`;
      const px = Math.min(hit.x + 10, W - 200);
      const py = Math.max(hit.y - 60, 10);
      popup.style.left = px + "px";
      popup.style.top  = py + "px";
      popup.classList.add("show");
    } else {
      popup.classList.remove("show");
    }
  });

  // 訪問リスト
  if (withLatLng.length === 0) {
    document.getElementById("emptyMsg").style.display = "block";
    return;
  }

  const listEl = document.getElementById("visitList");
  withLatLng.forEach((v, i) => {
    const row = document.createElement("div");
    row.className = "visit-row";
    row.innerHTML = `
      <span class="visit-row-icon">📍</span>
      <div class="visit-row-body">
        <div class="visit-row-place">${v.place || "—"}</div>
        <div class="visit-row-meta">${v.date || ""} ${v.time || ""}</div>
      </div>
    `;
    row.addEventListener("click", () => {
      document.querySelectorAll(".visit-row").forEach(r => r.classList.remove("active"));
      row.classList.add("active");
      const pt = points[i];
      if (pt) {
        document.getElementById("popupPlace").textContent = v.place || "—";
        document.getElementById("popupMeta").textContent  = `${v.date || ""} ${v.time || ""}`;
        popup.style.left = Math.min(pt.x + 10, W - 200) + "px";
        popup.style.top  = Math.max(pt.y - 60, 10) + "px";
        popup.classList.add("show");
      }
    });
    listEl.appendChild(row);
  });
}

main();
</script>
</body>
</html>
