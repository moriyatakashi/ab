<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m5 / 訪問記録</title>
<link rel="stylesheet" href="../style.css">
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:20px; }
  .back-link:hover { color:var(--accent); }


  .add-block {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .field-label { font-size: 0.7rem; font-weight: 600; color: var(--text-soft); margin-bottom: 2px; }
  .add-block input, .add-block textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.9rem; background: var(--bg); color: var(--text); font-family: inherit;
  }
  .add-block input:focus, .add-block textarea:focus { outline: none; border-color: var(--accent); }
  .add-block textarea { resize: none; height: 60px; }

  .date-time-row { display: flex; gap: 8px; }
  .date-time-row > div { flex: 1; }
  .date-time-row input { width: 100%; }

  .place-row { display: flex; gap: 8px; align-items: flex-end; }
  .place-row input { flex: 1; }
  .btn-gps {
    background: var(--panel); border: 1px solid var(--accent); color: var(--accent);
    font-size: 0.8rem; font-weight: 600; padding: 10px 12px;
    border-radius: 8px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-gps:hover { background: var(--accent-soft); }
  .btn-gps:disabled { opacity: 0.45; cursor: not-allowed; }

  .coord-row { display: flex; gap: 8px; }
  .coord-row input { flex: 1; font-size: 0.8rem; color: var(--text-soft); }

  .btn-add {
    background: var(--accent); color: #fff; padding: 12px;
    font-size: 0.9rem; font-weight: 600; border-radius: 8px; border: none;
    cursor: pointer; width: 100%; transition: opacity 0.15s;
  }
  .btn-add:hover { opacity: 0.85; }

  .visit-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  }
  .visit-main { flex: 1; min-width: 0; }
  .visit-place { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
  .visit-when { font-size: 0.75rem; color: var(--accent); margin-bottom: 4px; }
  .visit-memo { font-size: 0.82rem; color: var(--text-soft); line-height: 1.5; }
  .visit-coord { font-size: 0.7rem; color: var(--text-soft); margin-top: 4px; opacity: 0.6; }
  .btn-del {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-soft); font-size: 0.75rem; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>
  <h1>訪問記録</h1>
  <p class="sub">場所・日付・メモを記録する</p>

  <div class="add-block">
    <div>
      <div class="field-label">場所名</div>
      <div class="place-row">
        <input type="text" id="placeInput" placeholder="例: 布施駅、道頓堀" maxlength="80">
        <button class="btn-gps" id="btnGps" onclick="getLocation()">📍 現在地</button>
      </div>
    </div>
    <div class="date-time-row">
      <div>
        <div class="field-label">日付</div>
        <input type="date" id="dateInput">
      </div>
      <div>
        <div class="field-label">時間（任意）</div>
        <input type="time" id="timeInput">
      </div>
    </div>
    <div>
      <div class="field-label">メモ（任意）</div>
      <textarea id="memoInput" placeholder="ひとこと"></textarea>
    </div>
    <div class="coord-row" id="coordRow" style="display:none;">
      <input type="text" id="latInput" placeholder="緯度" readonly>
      <input type="text" id="lngInput" placeholder="経度" readonly>
    </div>
    <button class="btn-add" id="btnAdd">追加</button>
  </div>

  <p class="status" id="status">読み込み中...</p>
  <div class="list" id="list"></div>
  <p class="empty" id="emptyMsg" style="display:none; text-align:center; color:var(--text-soft); font-size:0.85rem; padding:32px 0;">記録はまだありません</p>
</div>

<script type="module">
  import { requireAuth, db } from "../auth.js";
  import { collection, addDoc, getDocs, deleteDoc, doc, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const COL = "ab_visits";

  const now = new Date();
  document.getElementById("dateInput").value =
    now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  document.getElementById("timeInput").value =
    String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");

  async function reverseGeocode(lat, lng) {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`,
      { headers: { "User-Agent": "ab-roreki/1.0" } }
    );
    if (!res.ok) throw new Error("Geocoding失敗");
    const data = await res.json();
    const a = data.address || {};
    return [
      a.city || a.town || a.village || a.county || "",
      a.suburb || a.neighbourhood || a.quarter || ""
    ].filter(Boolean).join(" ") || data.display_name?.split(",")[0] || "";
  }

  function setCoord(lat, lng) {
    const latR = Math.round(lat * 100000) / 100000;
    const lngR = Math.round(lng * 100000) / 100000;
    document.getElementById("latInput").value = latR;
    document.getElementById("lngInput").value = lngR;
    document.getElementById("coordRow").style.display = "flex";
    return { latR, lngR };
  }

  window.getLocation = async () => {
    const btn = document.getElementById("btnGps");
    if (!navigator.geolocation) { document.getElementById("status").textContent = "Geolocation非対応"; return; }
    btn.disabled = true; btn.textContent = "取得中...";
    document.getElementById("status").textContent = "現在地を取得中...";
    navigator.geolocation.getCurrentPosition(async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      setCoord(lat, lng);
      btn.textContent = "📍 現在地"; btn.disabled = false;
      try {
        const place = await reverseGeocode(lat, lng);
        if (place) document.getElementById("placeInput").value = place;
        document.getElementById("status").textContent = "現在地を設定しました";
      } catch(e) {
        document.getElementById("status").textContent = "地名取得失敗（座標は設定済み）";
      }
    }, err => {
      document.getElementById("status").textContent = "位置情報取得失敗: " + err.message;
      btn.textContent = "📍 現在地"; btn.disabled = false;
    }, { enableHighAccuracy: true, timeout: 10000 });
  };

  function formatWhen(date, time) {
    const [y,m,d] = date.split("-");
    const base = `${y}年${parseInt(m)}月${parseInt(d)}日`;
    return time ? `${base} ${time}` : base;
  }

  function renderItem(id, data) {
    const div = document.createElement("div");
    div.className = "visit-item";
    div.innerHTML = `
      <div class="visit-main">
        <div class="visit-place">${data.place}</div>
        <div class="visit-when">${formatWhen(data.date, data.time || "")}</div>
        ${data.memo ? `<div class="visit-memo">${data.memo}</div>` : ""}
        ${data.lat ? `<div class="visit-coord">📍 ${data.lat}, ${data.lng}</div>` : ""}
      </div>
      <button class="btn-del" onclick="del('${id}', this)">削除</button>
    `;
    return div;
  }

  async function load() {
    try {
      const q = query(collection(db, COL), orderBy("date","desc"));
      const snap = await getDocs(q);
      const list = document.getElementById("list");
      list.innerHTML = "";
      if (snap.empty) {
        document.getElementById("emptyMsg").style.display = "block";
        document.getElementById("status").textContent = "0件";
        return;
      }
      document.getElementById("emptyMsg").style.display = "none";
      const items = [];
      snap.forEach(d => items.push({ id: d.id, data: d.data() }));
      items.sort((a, b) => {
        const da = (a.data.date || "") + (a.data.time || "");
        const db_ = (b.data.date || "") + (b.data.time || "");
        return db_.localeCompare(da);
      });
      items.slice(0, 3).forEach(({ id, data }) => list.appendChild(renderItem(id, data)));
      document.getElementById("status").textContent = `直近3件 / 全${items.length}件`;
    } catch(e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  }

  document.getElementById("btnAdd").addEventListener("click", async () => {
    const place = document.getElementById("placeInput").value.trim();
    const date  = document.getElementById("dateInput").value;
    const time  = document.getElementById("timeInput").value;
    const memo  = document.getElementById("memoInput").value.trim();
    const lat   = document.getElementById("latInput").value;
    const lng   = document.getElementById("lngInput").value;
    if (!place) { document.getElementById("status").textContent = "場所名を入力してください"; return; }
    if (!date)  { document.getElementById("status").textContent = "日付を選んでください"; return; }
    document.getElementById("status").textContent = "追加中...";
    try {
      await addDoc(collection(db, COL), {
        place, date, time: time || null, memo,
        lat: lat ? Number(lat) : null,
        lng: lng ? Number(lng) : null,
        createdAt: new Date().toISOString()
      });
      document.getElementById("placeInput").value = "";
      document.getElementById("memoInput").value = "";
      document.getElementById("latInput").value = "";
      document.getElementById("lngInput").value = "";
      document.getElementById("timeInput").value = "";
      document.getElementById("coordRow").style.display = "none";
      document.getElementById("status").textContent = "追加しました ✓";
      await load();
    } catch(e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  });

  window.del = async (id, btn) => {
    if (!confirm("この記録を削除しますか？")) return;
    try {
      await deleteDoc(doc(db, COL, id));
      btn.closest(".visit-item").remove();
      const rem = document.getElementById("list").children.length;
      document.getElementById("status").textContent = `${rem}件`;
      if (rem === 0) document.getElementById("emptyMsg").style.display = "block";
    } catch(e) { alert("削除エラー: " + e.message); }
  };

  requireAuth(() => load());
</script>
</body>
</html>
