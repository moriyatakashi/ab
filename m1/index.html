<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m1 / 記録一覧</title>
<link rel="stylesheet" href="../style.css">
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:20px; }
  .back-link:hover { color:var(--accent); }

  .day-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .day-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .day-date {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }
  .day-dow {
    font-size: 0.75rem;
    color: var(--text-soft);
  }

  /* スコア行 */
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-label {
    font-size: 0.7rem;
    color: var(--text-soft);
    width: 36px;
    flex-shrink: 0;
  }
  .bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--accent-soft);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
  }
  .score-val {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }
  .score-note {
    font-size: 0.78rem;
    color: var(--text-soft);
    padding-left: 46px;
    margin-top: -4px;
  }

  /* 訪問行 */
  .visit-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .visit-icon {
    font-size: 0.85rem;
    width: 36px;
    flex-shrink: 0;
    color: var(--text-soft);
    padding-top: 1px;
  }
  .visit-info { flex: 1; min-width: 0; }
  .visit-place {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .visit-time {
    font-size: 0.72rem;
    color: var(--text-soft);
    margin-top: 1px;
  }
  .visit-memo {
    font-size: 0.75rem;
    color: var(--text-soft);
    margin-top: 2px;
  }

  .memo-item { display:flex; gap:8px; align-items:flex-start; font-size:0.82rem; padding:3px 0; }
  .memo-icon { color:var(--text-soft); flex-shrink:0; font-size:0.85rem; }
  .memo-text { color:var(--text-soft); flex:1; }
  .memo-input-tag { font-size:0.65rem; color:var(--text-soft); margin-left:4px; }
  .empty { text-align:center; color:var(--text-soft); font-size:0.85rem; padding:40px 0; }
  .list { display:flex; flex-direction:column; gap:10px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>
  <h1>記録一覧</h1>
  <p class="sub" id="status">読み込み中...</p>
  <div class="list" id="list"></div>
  <p class="empty" id="emptyMsg" style="display:none;">記録はまだありません</p>
  <p class="updated">更新: 2026-06-28 11:12</p>
</div>

<script type="module">
  import { db } from "../lib/firebase.js";
  import { collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
  const DOW = ["日","月","火","水","木","金","土"];

  function formatDate(s) {
    const [y, m, d] = s.split("-");
    const dow = DOW[new Date(s).getDay()];
    return { label: `${y}年${parseInt(m)}月${parseInt(d)}日`, dow };
  }

  async function load() {
    const statusEl = document.getElementById("status");
    const listEl   = document.getElementById("list");
    const emptyMsg = document.getElementById("emptyMsg");

    try {
      const [scoreSnap, visitSnap, memoSnap] = await Promise.all([
        getDocs(collection(db, "ab_items2")),
        getDocs(collection(db, "ab_visits")),
        getDocs(query(collection(db, "ab_memos"), orderBy("createdAt", "asc")))
      ]);

      // メモマップ
      const memoMap = {};
      memoSnap.forEach(d => {
        const data = d.data();
        if (!data.date) return;
        if (!memoMap[data.date]) memoMap[data.date] = [];
        memoMap[data.date].push({ memo: data.memo, createdAt: data.createdAt });
      });

      // スコア取得（ab_items2 から日付IDのもの）
      const scoreSnap2 = scoreSnap;

    const scoreMap  = {}; // date -> { score, note }
      scoreSnap.forEach(doc => {
        const id   = doc.id;
        const data = doc.data();
        if (DATE_RE.test(id) && !isNaN(Number(data.col2)) && Number(data.col2) >= 0 && Number(data.col2) <= 100) {
          scoreMap[id] = { score: Number(data.col2), note: data.col3 || "" };
        }
      });

      // 訪問記録取得（ab_visits）
      const visitMap  = {}; // date -> [{ place, time, memo }]
      visitSnap.forEach(doc => {
        const d = doc.data();
        if (!d.date) return;
        if (!visitMap[d.date]) visitMap[d.date] = [];
        visitMap[d.date].push({ place: d.place || "—", time: d.time || "", memo: d.memo || "" });
      });

      // 日付一覧をマージ・新しい順
      const allDates = [...new Set([...Object.keys(scoreMap), ...Object.keys(visitMap)])]
        .sort((a, b) => b.localeCompare(a));

      if (allDates.length === 0) {
        emptyMsg.style.display = "block";
        statusEl.textContent = "記録なし";
        return;
      }

      allDates.forEach(date => {
        const { label, dow } = formatDate(date);
        const score  = scoreMap[date];
        const visits = visitMap[date] || [];

        const card = document.createElement("div");
        card.className = "day-card";

        // ヘッダー
        card.innerHTML = `
          <div class="day-header">
            <span class="day-date">${label}</span>
            <span class="day-dow">${dow}曜</span>
          </div>
        `;

        // スコア
        if (score) {
          const scoreDiv = document.createElement("div");
          scoreDiv.innerHTML = `
            <div class="score-row">
              <span class="score-label">スコア</span>
              <div class="bar-wrap"><div class="bar" style="width:${score.score}%"></div></div>
              <span class="score-val">${score.score}</span>
            </div>
            ${score.note ? `<div class="score-note">${score.note}</div>` : ""}
          `;
          card.appendChild(scoreDiv);
        }

        // 訪問
        visits.sort((a, b) => a.time.localeCompare(b.time));
        visits.forEach(v => {
          const vDiv = document.createElement("div");
          vDiv.className = "visit-row";
          vDiv.innerHTML = `
            <span class="visit-icon">📍</span>
            <div class="visit-info">
              <div class="visit-place">${v.place}</div>
              ${v.time ? `<div class="visit-time">${v.time}</div>` : ""}
              ${v.memo ? `<div class="visit-memo">${v.memo}</div>` : ""}
            </div>
          `;
          card.appendChild(vDiv);
        });

        // メモ
        const memos = memoMap[date] || [];
        memos.forEach(m => {
          const mDiv = document.createElement("div");
          mDiv.className = "memo-item";
          // 入力日と対象日が違う場合は入力日を表示
          const inputDate = m.createdAt ? m.createdAt.substring(0, 10) : "";
          const tag = inputDate && inputDate !== date ? `<span class="memo-input-tag">（${inputDate}入力）</span>` : "";
          mDiv.innerHTML = `<span class="memo-icon">📝</span><span class="memo-text">${m.memo}${tag}</span>`;
          card.appendChild(mDiv);
        });

        listEl.appendChild(card);
      });

      statusEl.textContent = `${allDates.length} 日分`;
    } catch(e) {
      statusEl.textContent = "エラー: " + e.message;
    }
  }

  load();
</script>
</body>
</html>
