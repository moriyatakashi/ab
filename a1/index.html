<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a1 - Firestore viewer</title>
<link rel="stylesheet" href="../style.css">
<style>
  :root {
    --tag-bg: #ede9e3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 1.2rem; margin-bottom: 2px; }
  .sub { font-size: 0.78rem; margin-bottom: 16px; }
  .status { font-size: 0.75rem; margin-bottom: 16px; min-height: 16px; }
  .btn-reload {
    cursor: pointer; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.78rem; padding: 5px 12px; background: var(--panel);
    color: var(--text); margin-bottom: 16px;
  }
  .btn-reload:hover { border-color: var(--accent); color: var(--accent); }
  .col-select-wrap {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .col-check-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.72rem; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; cursor: pointer; user-select: none;
    transition: border-color 0.15s;
  }
  .col-check-label:hover { border-color: var(--accent); }
  .col-check-label input[type=checkbox] { accent-color: var(--accent); }
  .col-check-label.checked { border-color: var(--accent); background: var(--accent-soft); }
  .select-all-btn {
    font-size: 0.7rem; color: var(--text-soft); background: none; border: none;
    cursor: pointer; padding: 4px 6px; text-decoration: underline;
  }
  .btn-copy {
    cursor: pointer; border: 1px solid var(--accent); border-radius: 6px;
    font-size: 0.78rem; padding: 5px 12px; background: var(--accent-soft);
    color: var(--accent); margin-bottom: 16px; margin-left: 6px; font-weight: 600;
  }
  .btn-copy:hover { background: var(--accent); color: #fff; }
  .btn-copy.copied { background: #4caf50; border-color: #4caf50; color: #fff; }

  /* 構造サマリー */
  .schema-section { margin-bottom: 28px; }
  .schema-section h2 {
    font-size: 0.8rem; font-weight: 600; color: var(--text-soft);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .schema-list { display: flex; flex-direction: column; gap: 6px; }
  .schema-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
  }
  .schema-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .schema-col-name { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .schema-count {
    font-size: 0.7rem; background: var(--tag-bg); color: var(--text-soft);
    padding: 2px 8px; border-radius: 10px;
  }
  .schema-fields { display: flex; flex-direction: column; gap: 3px; }
  .schema-field {
    display: flex; gap: 8px; font-size: 0.8rem; align-items: center;
  }
  .schema-field-name { color: var(--text); min-width: 100px; font-family: monospace; font-size: 0.78rem; }
  .type-tag {
    font-size: 0.68rem; padding: 1px 7px; border-radius: 8px;
    background: var(--accent-soft); color: var(--accent); font-family: monospace;
  }
  .schema-error { font-size: 0.78rem; color: #b34444; }

  /* データ一覧 */
  .data-section { margin-bottom: 28px; }
  .data-section h2 {
    font-size: 0.8rem; font-weight: 600; color: var(--text-soft);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px;
  }
  .collection { margin-bottom: 20px; }
  .collection-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 2px solid var(--accent-soft);
  }
  .collection-name { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .collection-count {
    font-size: 0.7rem; background: var(--tag-bg); color: var(--text-soft);
    padding: 2px 8px; border-radius: 10px;
  }
  .doc-list { display: flex; flex-direction: column; gap: 6px; }
  .doc { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .doc-id { font-size: 0.68rem; color: var(--text-soft); margin-bottom: 6px; font-family: monospace; }
  .fields { display: flex; flex-direction: column; gap: 3px; }
  .field { display: flex; gap: 8px; font-size: 0.82rem; align-items: baseline; }
  .field-key { color: var(--text-soft); min-width: 80px; font-size: 0.72rem; flex-shrink: 0; font-family: monospace; }
  .field-val { color: var(--text); word-break: break-all; }
  .col-error { font-size: 0.78rem; color: #b34444; padding: 8px 0; }

  /* SQL コンソール */
  .sql-console {
    margin-top: 32px;
    border-top: 2px solid var(--accent-soft);
    padding-top: 20px;
  }
  .sql-console h2 {
    font-size: 0.8rem; font-weight: 600; color: var(--text-soft);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px;
  }

  .sql-input {
    width: 100%; font-family: monospace; font-size: 0.82rem;
    padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: #fafaf8; color: var(--text);
    resize: vertical; min-height: 100px;
    line-height: 1.6;
  }
  .sql-input:focus { outline: none; border-color: var(--accent); }
  .sql-run {
    margin-top: 8px; padding: 10px 20px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 0.88rem;
    font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .sql-run:hover { opacity: 0.85; }
  .sql-run:disabled { opacity: 0.4; cursor: not-allowed; }
  .sql-log {
    margin-top: 10px; font-family: monospace; font-size: 0.78rem;
    max-height: 200px; overflow-y: auto;
    background: #1e1e1e; color: #d4d4d4;
    border-radius: 8px; padding: 10px 12px;
    display: none;
  }
  .sql-log.show { display: block; }
  .log-ok { color: #4ec9b0; }
  .log-err { color: #f48771; }
  .log-info { color: #9cdcfe; }
</style>
</head>
<body>
<div class="wrap">
  <a style="display:inline-block;font-size:0.8rem;color:var(--text-soft);text-decoration:none;margin-bottom:16px;" href="../">← ab トップ</a>
  <h1>a1</h1>
  <p class="sub">Firestore ビューア（ab01-9f35a）</p>
  <button class="btn-reload" id="btnReload">↻ 再読み込み</button>
  <div style="margin: 10px 0 4px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
      <span style="font-size:0.7rem; color:var(--text-soft);">コピー対象：</span>
      <button class="select-all-btn" id="btnSelectAll">全選択</button>
      <button class="select-all-btn" id="btnSelectNone">全解除</button>
    </div>
    <div class="col-select-wrap" id="colSelectWrap"></div>
  </div>
  <button class="btn-copy" id="btnCopy">📋 選択したコレクションをコピー</button>
  <p class="status" id="status">読み込み中...</p>
  <div id="content"></div>

  <div class="sql-console">
    <h2>🛠 SQL コンソール</h2>
    <textarea class="sql-input" id="sqlInput" placeholder="INSERT ab_items2 col1=&quot;値&quot; col2=&quot;値&quot; col3=&quot;値&quot;
UPDATE ab_items2 id=&quot;docId&quot; col1=&quot;新しい値&quot;
DELETE ab_items2 id=&quot;docId&quot;
TRUNCATE ab_sandbox
-- 複数行まとめて実行可"></textarea>
    <button class="sql-run" id="sqlRun">▶ 実行</button>
    <div class="sql-log" id="sqlLog"></div>
  </div>
  <p class="updated">更新: 2026-07-02 05:52</p>
</div>

<script type="module">
  import { db } from "../lib/firebase.js";
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const COLLECTIONS = ["ab_items2", "ab_sandbox", "ab_visits", "ab_checks", "ab_reviews", "ab_tasks", "ab_memos"];
  const SKIP_FIELDS = ["createdAt", "updatedAt"];
  const FIELD_ORDER = ["col1", "col2", "col3"];

  function detectType(val) {
    if (val instanceof Date) return "timestamp";
    if (val === null || val === undefined) return "null";
    if (typeof val === "boolean") return "boolean";
    if (typeof val === "number") return Number.isInteger(val) ? "integer" : "double";
    if (typeof val === "string") {
      if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return "string (date-like)";
      if (/^\d+$/.test(val)) return "string (numeric)";
      return "string";
    }
    if (typeof val === "object") return "map";
    return "unknown";
  }

  function formatVal(val) {
    if (val === null || val === undefined || val === "") return "（空）";
    if (val && val.toDate) return val.toDate().toLocaleString("ja-JP");
    return String(val);
  }

  function sortFields(fields) {
    const ordered = FIELD_ORDER.filter(k => k in fields);
    const rest = Object.keys(fields).filter(k => !FIELD_ORDER.includes(k) && !SKIP_FIELDS.includes(k));
    return [...ordered, ...rest];
  }

  async function load() {
    const statusEl = document.getElementById("status");
    statusEl.textContent = "処理中...";
    const allData = {};
    const contentEl = document.getElementById("content");
    contentEl.innerHTML = "";

    // --- 構造サマリー ---
    const schemaSection = document.createElement("div");
    schemaSection.className = "schema-section";
    schemaSection.innerHTML = '<h2>構造サマリー</h2>';
    const schemaList = document.createElement("div");
    schemaList.className = "schema-list";

    // --- データ一覧 ---
    const dataSection = document.createElement("div");
    dataSection.className = "data-section";
    dataSection.innerHTML = '<h2>データ一覧</h2>';

    let totalDocs = 0;

    for (const colName of COLLECTIONS) {
      const schemaItem = document.createElement("div");
      schemaItem.className = "schema-item";
      const colDiv = document.createElement("div");
      colDiv.className = "collection";

      let snap;
      try {
        snap = await getDocs(collection(db, colName));
      } catch(e) {
        continue;
      }

      // 0件スキップ
      if (snap.size === 0) continue;

      allData[colName] = [];

      try {

        // スキーマ収集
        const fieldTypes = {}; // { fieldName: Set<type> }
        snap.forEach(d => {
          const data = d.data();
          Object.entries(data).forEach(([k, v]) => {
            if (!fieldTypes[k]) fieldTypes[k] = new Set();
            fieldTypes[k].add(detectType(v));
          });
        });

        // スキーマ表示
        schemaItem.innerHTML = `
          <div class="schema-header">
            <span class="schema-col-name">${colName}</span>
            <span class="schema-count">${snap.size} 件</span>
          </div>
        `;
        const schemaFields = document.createElement("div");
        schemaFields.className = "schema-fields";

        const allFields = [...FIELD_ORDER.filter(k => k in fieldTypes),
          ...Object.keys(fieldTypes).filter(k => !FIELD_ORDER.includes(k))];

        allFields.forEach(k => {
          const types = [...fieldTypes[k]].join(" / ");
          const isSkipped = SKIP_FIELDS.includes(k);
          const row = document.createElement("div");
          row.className = "schema-field";
          row.innerHTML = `
            <span class="schema-field-name">${k}</span>
            <span class="type-tag">${types}</span>
            ${isSkipped ? '<span style="font-size:0.68rem;color:var(--text-soft)">(管理用)</span>' : ''}
          `;
          schemaFields.appendChild(row);
        });
        schemaItem.appendChild(schemaFields);

        // データ一覧
        totalDocs += snap.size;
        colDiv.innerHTML = `
          <div class="collection-header">
            <span class="collection-name">${colName}</span>
            <span class="collection-count">${snap.size} 件</span>
          </div>
        `;
        const docList = document.createElement("div");
        docList.className = "doc-list";

        const docs = [];
        snap.forEach(d => docs.push({ id: d.id, data: d.data() }));
        allData[colName] = docs.map(d => ({ id: d.id, ...d.data }));
        docs.sort((a, b) => b.id.localeCompare(a.id));

        docs.forEach(({ id, data }) => {
          const docDiv = document.createElement("div");
          docDiv.className = "doc";
          const idEl = document.createElement("div");
          idEl.className = "doc-id";
          idEl.textContent = "ID: " + id;
          docDiv.appendChild(idEl);

          const fieldsEl = document.createElement("div");
          fieldsEl.className = "fields";

          sortFields(data).forEach(k => {
            const row = document.createElement("div");
            row.className = "field";
            row.innerHTML = `<span class="field-key">${k}</span><span class="field-val">${formatVal(data[k])}</span>`;
            fieldsEl.appendChild(row);
          });

          docDiv.appendChild(fieldsEl);
          docList.appendChild(docDiv);
        });

        colDiv.appendChild(docList);

      } catch(e) {
        schemaItem.innerHTML = `
          <div class="schema-header"><span class="schema-col-name">${colName}</span></div>
          <p class="schema-error">エラー: ${e.message}</p>
        `;
        colDiv.innerHTML = `
          <div class="collection-header"><span class="collection-name">${colName}</span></div>
          <p class="col-error">エラー: ${e.message}</p>
        `;
      }

        schemaList.appendChild(schemaItem);
      dataSection.appendChild(colDiv);
    }

    schemaSection.appendChild(schemaList);
    contentEl.appendChild(schemaSection);
    contentEl.appendChild(dataSection);
    window._allData = allData;
    buildColCheckboxes(Object.keys(allData));
    statusEl.textContent = `合計 ${totalDocs} 件`;
  }


  // ── SQL コンソール ──────────────────────────────
  function parseArgs(str) {
    const re = /([\w]+)=(?:"([^"]*)"|([^\s]*))/g;
    const obj = {};
    let m;
    while ((m = re.exec(str)) !== null) {
      obj[m[1]] = m[2] !== undefined ? m[2] : m[3];
    }
    return obj;
  }

  function logLine(msg, cls = '') {
    const logEl = document.getElementById('sqlLog');
    logEl.classList.add('show');
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  async function execSQL(raw) {
    const { addDoc, setDoc, updateDoc, deleteDoc,
            doc: fsDoc, collection: fsCol } =
      await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

    const lines = raw.split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('--'));

    let ok = 0, err = 0;
    for (const line of lines) {
      const tokens = line.match(/^(\S+)\s+(\S+)\s*(.*)$/);
      if (!tokens) { logLine('? 構文不明: ' + line, 'log-err'); err++; continue; }
      const [, cmd, colName, rest] = tokens;
      const args = parseArgs(rest);

      try {
        switch (cmd.toUpperCase()) {
          case 'INSERT': {
            const data = {};
            ['col1','col2','col3'].forEach(k => { if (args[k] !== undefined) data[k] = args[k]; });
            data.createdAt = new Date().toISOString();
            if (args.id) {
              await setDoc(fsDoc(db, colName, args.id), data);
              logLine('✓ INSERT (id指定) → ' + colName + '/' + args.id, 'log-ok');
            } else {
              const ref = await addDoc(fsCol(db, colName), data);
              logLine('✓ INSERT → ' + colName + '/' + ref.id, 'log-ok');
            }
            ok++; break;
          }
          case 'UPDATE': {
            if (!args.id) throw new Error('id= が必要');
            const data = {};
            ['col1','col2','col3'].forEach(k => { if (args[k] !== undefined) data[k] = args[k]; });
            await updateDoc(fsDoc(db, colName, args.id), data);
            logLine('✓ UPDATE → ' + colName + '/' + args.id, 'log-ok');
            ok++; break;
          }
          case 'DELETE': {
            if (!args.id) throw new Error('id= が必要');
            await deleteDoc(fsDoc(db, colName, args.id));
            logLine('✓ DELETE → ' + colName + '/' + args.id, 'log-ok');
            ok++; break;
          }
          case 'TRUNCATE': {
            const { getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
            const snap = await getDocs(fsCol(db, colName));
            let cnt = 0;
            for (const d of snap.docs) {
              await deleteDoc(fsDoc(db, colName, d.id));
              cnt++;
            }
            logLine('✓ TRUNCATE → ' + colName + ' (' + cnt + '件削除)', 'log-ok');
            ok++; break;
          }
          default:
            logLine('? 未対応コマンド: ' + cmd, 'log-err'); err++;
        }
      } catch(e) {
        logLine('✗ ' + line + ' → ' + e.message, 'log-err'); err++;
      }
    }
    logLine('── 完了: ' + ok + '成功 / ' + err + 'エラー ──', 'log-info');
    if (ok > 0) setTimeout(() => load(), 800);
  }

  document.getElementById('sqlRun').addEventListener('click', async () => {
    const btn = document.getElementById('sqlRun');
    const input = document.getElementById('sqlInput').value.trim();
    if (!input) return;
    document.getElementById('sqlLog').innerHTML = '';
    btn.disabled = true;
    btn.textContent = '実行中...';
    await execSQL(input);
    btn.disabled = false;
    btn.textContent = '▶ 実行';
  });
  // ────────────────────────────────────────────────

  document.getElementById("btnReload").addEventListener("click", load);

  // チェックボックスを生成（load完了後に呼ぶ）
  function buildColCheckboxes(colNames) {
    const wrap = document.getElementById("colSelectWrap");
    wrap.innerHTML = "";
    colNames.forEach(col => {
      const label = document.createElement("label");
      label.className = "col-check-label checked";
      label.innerHTML = `<input type="checkbox" value="${col}" checked> ${col}`;
      label.querySelector("input").addEventListener("change", e => {
        label.classList.toggle("checked", e.target.checked);
      });
      wrap.appendChild(label);
    });
  }

  document.getElementById("btnSelectAll").addEventListener("click", () => {
    document.querySelectorAll("#colSelectWrap input[type=checkbox]").forEach(cb => {
      cb.checked = true;
      cb.closest("label").classList.add("checked");
    });
  });
  document.getElementById("btnSelectNone").addEventListener("click", () => {
    document.querySelectorAll("#colSelectWrap input[type=checkbox]").forEach(cb => {
      cb.checked = false;
      cb.closest("label").classList.remove("checked");
    });
  });

  document.getElementById("btnCopy").addEventListener("click", async () => {
    const btn = document.getElementById("btnCopy");
    const selected = [...document.querySelectorAll("#colSelectWrap input[type=checkbox]:checked")]
      .map(cb => cb.value);
    const base = window._allData || {};
    const out = {};
    if (selected.length > 0) {
      selected.forEach(col => { if (base[col] !== undefined) out[col] = base[col]; });
    } else {
      Object.assign(out, base);
    }
    try {
      await navigator.clipboard.writeText(JSON.stringify(out, null, 2));
      btn.textContent = "✓ コピーしました";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "📋 選択したコレクションをコピー"; btn.classList.remove("copied"); }, 2000);
    } catch(e) {
      alert("コピー失敗: " + e.message);
    }
  });

  load();
</script>
</body>
</html>
