<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ab hub</title>
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --border: #e2ded6;
    --text: #2b2b2b;
    --text-soft: #7a7568;
    --accent: #b5651d;
    --accent-soft: #f1e3d3;
    --nav-w: 180px;
    --tab-h: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  /* ── レイアウト ── */
  #app {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* ── サイドナビ（PC） ── */
  #sidenav {
    width: var(--nav-w);
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 16px 0 24px;
  }
  .nav-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    padding: 0 16px 14px;
    letter-spacing: 0.02em;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .nav-section {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--text-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 16px 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.1s;
    color: var(--text);
    font-size: 0.88rem;
    border-left: 3px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--accent-soft); }
  .nav-item.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-label { flex: 1; }

  /* ── コンテンツエリア ── */
  #content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  #content iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── ボトムタブ（スマホ） ── */
  #bottomtab {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--tab-h);
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: none;
    grid-template-columns: repeat(5, 1fr);
    z-index: 100;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 2px;
    color: var(--text-soft);
    font-size: 0.6rem;
    transition: color 0.1s;
    user-select: none;
  }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 1.3rem; }
  .tab-label { font-size: 0.58rem; font-weight: 500; }

  /* ── タブ「もっと」ドロワー ── */
  #drawer {
    display: none;
    position: fixed;
    bottom: var(--tab-h);
    left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 8px 0;
    z-index: 99;
  }
  #drawer.open { display: block; }
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--text);
  }
  .drawer-item:hover { background: var(--accent-soft); }
  .drawer-item.active { color: var(--accent); font-weight: 600; }
  .drawer-icon { font-size: 1.1rem; width: 24px; text-align: center; }

  /* ── スマホ時はサイドナビ非表示・iframe高さ調整 ── */
  @media (max-width: 600px) {
    #sidenav { display: none; }
    #bottomtab { display: grid; }
    #content { padding-bottom: var(--tab-h); height: 100vh; }
    #content iframe { height: 100%; }
    html, body { overflow: hidden; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- サイドナビ（PC用） -->
  <nav id="sidenav">
    <div class="nav-title">ab</div>

    <div class="nav-section">記録する</div>
    <div class="nav-item active" data-page="m7" onclick="go('m7',this)">
      <span class="nav-icon">📊</span><span class="nav-label">今日のスコア</span>
    </div>
    <div class="nav-item" data-page="m6" onclick="go('m6',this)">
      <span class="nav-icon">📝</span><span class="nav-label">一行日記</span>
    </div>
    <div class="nav-item" data-page="m5" onclick="go('m5',this)">
      <span class="nav-icon">📍</span><span class="nav-label">訪問記録</span>
    </div>

    <div class="nav-section">見る・探る</div>
    <div class="nav-item" data-page="m1" onclick="go('m1',this)">
      <span class="nav-icon">📈</span><span class="nav-label">スコア履歴</span>
    </div>
    <div class="nav-item" data-page="m4" onclick="go('m4',this)">
      <span class="nav-icon">🚃</span><span class="nav-label">トリビア</span>
    </div>

    <div class="nav-section">データ管理</div>
    <div class="nav-item" data-page="main" onclick="go('main',this)">
      <span class="nav-icon">🗄</span><span class="nav-label">main CRUD</span>
    </div>
    <div class="nav-item" data-page="sandbox" onclick="go('sandbox',this)">
      <span class="nav-icon">🧪</span><span class="nav-label">sandbox</span>
    </div>
    <div class="nav-item" data-page="mm" onclick="go('mm',this)">
      <span class="nav-icon">⌨️</span><span class="nav-label">mm（旧）</span>
    </div>
    <div class="nav-item" data-page="m3" onclick="go('m3',this)">
      <span class="nav-icon">🔍</span><span class="nav-label">Firestoreビューア</span>
    </div>
  </nav>

  <!-- メインコンテンツ -->
  <div id="content">
    <iframe id="frame" src="m7/"></iframe>
  </div>

</div>

<!-- ボトムタブ（スマホ用）：よく使う5つ + もっと -->
<div id="bottomtab">
  <div class="tab-item active" data-page="m7" onclick="go('m7',this)">
    <span class="tab-icon">📊</span><span class="tab-label">スコア</span>
  </div>
  <div class="tab-item" data-page="m6" onclick="go('m6',this)">
    <span class="tab-icon">📝</span><span class="tab-label">日記</span>
  </div>
  <div class="tab-item" data-page="m5" onclick="go('m5',this)">
    <span class="tab-icon">📍</span><span class="tab-label">訪問</span>
  </div>
  <div class="tab-item" data-page="m1" onclick="go('m1',this)">
    <span class="tab-icon">📈</span><span class="tab-label">履歴</span>
  </div>
  <div class="tab-item" id="moreBtn" onclick="toggleDrawer()">
    <span class="tab-icon">☰</span><span class="tab-label">もっと</span>
  </div>
</div>

<!-- ドロワー（もっとの中身） -->
<div id="drawer">
  <div class="drawer-item" data-page="m4" onclick="go('m4',this);closeDrawer()">
    <span class="drawer-icon">🚃</span>トリビア
  </div>
  <div class="drawer-item" data-page="main" onclick="go('main',this);closeDrawer()">
    <span class="drawer-icon">🗄</span>main CRUD
  </div>
  <div class="drawer-item" data-page="sandbox" onclick="go('sandbox',this);closeDrawer()">
    <span class="drawer-icon">🧪</span>sandbox
  </div>
  <div class="drawer-item" data-page="mm" onclick="go('mm',this);closeDrawer()">
    <span class="drawer-icon">⌨️</span>mm（旧）
  </div>
  <div class="drawer-item" data-page="m3" onclick="go('m3',this);closeDrawer()">
    <span class="drawer-icon">🔍</span>Firestoreビューア
  </div>
</div>

<script>
const PAGES = {
  m7: 'm7/', m6: 'm6/', m5: 'm5/',
  m1: 'm1/', m4: 'm4/',
  main: 'main/', sandbox: 'sandbox/', mm: 'mm/', m3: 'm3/'
};

let current = 'm7';

function go(page, el) {
  if (!PAGES[page]) return;
  current = page;
  document.getElementById('frame').src = PAGES[page];

  // サイドナビのactive
  document.querySelectorAll('#sidenav .nav-item').forEach(i => i.classList.remove('active'));
  const sideEl = document.querySelector(`#sidenav [data-page="${page}"]`);
  if (sideEl) sideEl.classList.add('active');

  // ボトムタブのactive
  document.querySelectorAll('#bottomtab .tab-item').forEach(i => i.classList.remove('active'));
  const tabEl = document.querySelector(`#bottomtab [data-page="${page}"]`);
  if (tabEl) tabEl.classList.add('active');

  // ドロワーのactive
  document.querySelectorAll('#drawer .drawer-item').forEach(i => i.classList.remove('active'));
  const drawerEl = document.querySelector(`#drawer [data-page="${page}"]`);
  if (drawerEl) drawerEl.classList.add('active');
}

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

// ドロワー外タップで閉じる
document.addEventListener('click', e => {
  if (!e.target.closest('#drawer') && !e.target.closest('#moreBtn')) closeDrawer();
});
</script>
</body>
</html>
