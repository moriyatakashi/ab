<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ab hub</title>
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --border: #e2ded6;
    --text: #2b2b2b;
    --text-soft: #7a7568;
    --accent: #b5651d;
    --accent-soft: #f1e3d3;
    --nav-w: 180px;
    --tab-h: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  #app { display: flex; height: 100vh; width: 100vw; }

  /* サイドナビ（PC） */
  #sidenav {
    width: var(--nav-w); flex-shrink: 0;
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; padding: 16px 0 24px;
  }
  .nav-title { font-size: 1rem; font-weight: 700; color: var(--text); padding: 0 16px 14px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .nav-section { font-size: 0.62rem; font-weight: 700; color: var(--text-soft); letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 16px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; cursor: pointer;
    color: var(--text); font-size: 0.88rem;
    border-left: 3px solid transparent;
    transition: background 0.1s; user-select: none;
  }
  .nav-item:hover { background: var(--accent-soft); }
  .nav-item.active { background: var(--accent-soft); border-left-color: var(--accent); color: var(--accent); font-weight: 600; }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }

  /* コンテンツ */
  #content { flex: 1; overflow: hidden; position: relative; }
  #content iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ボトムタブ（スマホ） */
  #bottomtab {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--tab-h); background: var(--panel); border-top: 1px solid var(--border);
    grid-template-columns: repeat(5, 1fr); z-index: 100;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; padding: 6px 2px;
    color: var(--text-soft); font-size: 0.6rem; transition: color 0.1s; user-select: none;
  }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 1.3rem; }
  .tab-label { font-size: 0.58rem; font-weight: 500; }

  /* ドロワー */
  #drawer {
    display: none; position: fixed; bottom: var(--tab-h); left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--border); padding: 8px 0; z-index: 99;
  }
  #drawer.open { display: block; }
  .drawer-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; cursor: pointer; font-size: 0.9rem; color: var(--text);
  }
  .drawer-item:hover { background: var(--accent-soft); }
  .drawer-item.active { color: var(--accent); font-weight: 600; }
  .drawer-icon { font-size: 1.1rem; width: 24px; text-align: center; }

  @media (max-width: 600px) {
    #sidenav { display: none; }
    #bottomtab { display: grid; }
    #content { padding-bottom: var(--tab-h); height: 100vh; }
    #content iframe { height: 100%; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="sidenav">
    <div class="nav-title">ab</div>

    <div class="nav-section">残す</div>
    <div class="nav-item active" data-page="m7" onclick="go('m7',this)">
      <span class="nav-icon">📊</span><span>今日の記録</span>
    </div>
    <div class="nav-item" data-page="m5" onclick="go('m5',this)">
      <span class="nav-icon">📍</span><span>訪問記録</span>
    </div>

    <div class="nav-section">みる</div>
    <div class="nav-item" data-page="m1" onclick="go('m1',this)">
      <span class="nav-icon">📋</span><span>記録一覧</span>
    </div>

    <div class="nav-section">遊ぶ</div>
    <div class="nav-item" data-page="m4" onclick="go('m4',this)">
      <span class="nav-icon">🚃</span><span>トリビア</span>
    </div>

    <div class="nav-section">管理</div>
    <div class="nav-item" data-page="main" onclick="go('main',this)">
      <span class="nav-icon">🗄</span><span>CRUD</span>
    </div>
    <div class="nav-item" data-page="m3" onclick="go('m3',this)">
      <span class="nav-icon">🔍</span><span>Firestoreビューア</span>
    </div>
  </nav>

  <div id="content">
    <iframe id="frame" src="../m7/"></iframe>
  </div>
</div>

<!-- ボトムタブ：残す／みる／訪問／遊ぶ／もっと -->
<div id="bottomtab">
  <div class="tab-item active" data-page="m7" onclick="go('m7',this)">
    <span class="tab-icon">📊</span><span class="tab-label">記録</span>
  </div>
  <div class="tab-item" data-page="m5" onclick="go('m5',this)">
    <span class="tab-icon">📍</span><span class="tab-label">訪問</span>
  </div>
  <div class="tab-item" data-page="m1" onclick="go('m1',this)">
    <span class="tab-icon">📋</span><span class="tab-label">みる</span>
  </div>
  <div class="tab-item" data-page="m4" onclick="go('m4',this)">
    <span class="tab-icon">🚃</span><span class="tab-label">遊ぶ</span>
  </div>
  <div class="tab-item" id="moreBtn" onclick="toggleDrawer()">
    <span class="tab-icon">☰</span><span class="tab-label">管理</span>
  </div>
</div>

<div id="drawer">
  <div class="drawer-item" data-page="main" onclick="go('main',this);closeDrawer()">
    <span class="drawer-icon">🗄</span>CRUD
  </div>
  <div class="drawer-item" data-page="m3" onclick="go('m3',this);closeDrawer()">
    <span class="drawer-icon">🔍</span>Firestoreビューア
  </div>
</div>

<script>
const PAGES = {
  m7: '../m7/', m5: '../m5/',
  m1: '../m1/', m4: '../m4/',
  main: '../main/', m3: '../m3/'
};

function go(page, el) {
  if (!PAGES[page]) return;
  document.getElementById('frame').src = PAGES[page];
  document.querySelectorAll('[data-page]').forEach(i => i.classList.remove('active'));
  document.querySelectorAll(`[data-page="${page}"]`).forEach(i => i.classList.add('active'));
}

function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }
function closeDrawer()  { document.getElementById('drawer').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#drawer') && !e.target.closest('#moreBtn')) closeDrawer();
});
</script>
</body>
</html>
