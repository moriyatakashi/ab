<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m11 — レーダーチャート</title>
<link rel="stylesheet" href="../style.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
  }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fffdf9;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 20px 22px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-soft);
    margin: 0 0 4px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 20px;
    letter-spacing: 0.02em;
  }
  svg { display: block; margin: 0 auto; }
  .caption {
    text-align: center;
    font-size: 11px;
    color: var(--text-soft);
    margin: 8px 0 0;
  }
  .grid-line { stroke: var(--border); stroke-width: 1; fill: none; }
  .spoke { stroke: var(--border); stroke-width: 1; }
  .shape {
    fill: var(--accent-soft);
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linejoin: round;
  }
  .dot { fill: var(--accent); }
  .dot.below { fill: var(--danger); }
  .label { font-size: 12px; fill: var(--text); text-anchor: middle; }
  .label.below { fill: var(--danger); font-weight: 600; }
  .baseline {
    fill: none;
    stroke: var(--text-soft);
    stroke-width: 1.2;
    stroke-dasharray: 4 3;
  }
  .footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: 18px;
  }
  button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid var(--text);
    background: var(--text);
    color: var(--bg);
    border-radius: 3px;
    cursor: pointer;
  }
  button:active { opacity: 0.8; }
  .legend {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    row-gap: 8px;
    column-gap: 12px;
  }
  .legend-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-size: 12px;
  }
  .legend-key {
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
  }
  .legend-key.below { color: var(--danger); }
  .legend-name {
    color: var(--text);
  }
  .legend-name.below { color: var(--danger); font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">RADAR / 5 AXES</p>
  <h1>五角形レーダーチャート（仮値）</h1>
  <svg id="chart" width="340" height="340" viewBox="0 0 340 340"></svg>
  <p class="caption" id="caption"></p>
  <div class="footer">
    <button id="randomizeBtn">値を振り直す</button>
  </div>
  <div class="legend" id="legend"></div>
</div>

<script>
// ── 設定（このブロックだけ差し替えれば本番値に切り替えられる） ──
const CONFIG = {
  labels: ["軸A", "軸B", "軸C", "軸D", "軸E"],
  legendNames: [
    "取り組みやすさ",
    "効果の大きさ",
    "手間の少なさ",
    "継続のしやすさ",
    "後戻りのしにくさ"
  ],
  minVal: 3,
  maxVal: 5,
  baseline: 3.8,   // 基準線（固定値）
  ringCount: 4,    // 背景グリッドの同心円数
  cx: 170,
  cy: 165,
  radius: 110,
};
const N = CONFIG.labels.length;
const SVG_NS = 'http://www.w3.org/2000/svg';

// ── ヘルパー ──
const isBelow = (value) => value < CONFIG.baseline;

/** i番目の軸方向に半径rの位置の座標を返す */
function polarPoint(i, r) {
  const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
  return [CONFIG.cx + r * Math.cos(angle), CONFIG.cy + r * Math.sin(angle)];
}

/** i番目の軸上で、値valueに対応する座標を返す */
function valuePoint(i, value) {
  return polarPoint(i, (value / CONFIG.maxVal) * CONFIG.radius);
}

/** SVG要素を生成して属性・クラスをまとめて設定する */
function svgEl(tag, attrs = {}, className = '') {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [key, val] of Object.entries(attrs)) el.setAttribute(key, val);
  if (className) el.setAttribute('class', className);
  return el;
}

function randomValues() {
  const { minVal, maxVal } = CONFIG;
  return Array.from({ length: N }, () =>
    minVal + Math.floor(Math.random() * (maxVal - minVal + 1))
  );
}

// ── 描画 ──
function renderGrid(svg) {
  for (let ring = 1; ring <= CONFIG.ringCount; ring++) {
    const r = (CONFIG.radius * ring) / CONFIG.ringCount;
    const points = Array.from({ length: N }, (_, i) => polarPoint(i, r).join(',')).join(' ');
    svg.appendChild(svgEl('polygon', { points }, 'grid-line'));
  }
}

function renderBaseline(svg) {
  const points = Array.from({ length: N }, (_, i) => valuePoint(i, CONFIG.baseline).join(',')).join(' ');
  svg.appendChild(svgEl('polygon', { points }, 'baseline'));
}

function renderAxes(svg, values) {
  for (let i = 0; i < N; i++) {
    const [x, y] = polarPoint(i, CONFIG.radius);
    svg.appendChild(svgEl('line', { x1: CONFIG.cx, y1: CONFIG.cy, x2: x, y2: y }, 'spoke'));

    const [lx, ly] = polarPoint(i, CONFIG.radius + 24);
    const label = svgEl('text', { x: lx, y: ly }, isBelow(values[i]) ? 'label below' : 'label');
    label.textContent = CONFIG.labels[i];
    svg.appendChild(label);
  }
}

function renderDataShape(svg, values) {
  const dataPoints = values.map((v, i) => valuePoint(i, v));
  const points = dataPoints.map(p => p.join(',')).join(' ');
  svg.appendChild(svgEl('polygon', { points }, 'shape'));

  dataPoints.forEach(([x, y], i) => {
    const below = isBelow(values[i]);
    svg.appendChild(svgEl(
      'circle',
      { cx: x, cy: y, r: below ? 4.5 : 3.5 },
      below ? 'dot below' : 'dot'
    ));
  });
}

function renderLegend(values) {
  const legend = document.getElementById('legend');
  legend.innerHTML = CONFIG.labels.map((label, i) => {
    const cls = isBelow(values[i]) ? ' below' : '';
    return `<div class="legend-item"><span class="legend-key${cls}">${label}</span><span class="legend-name${cls}">${CONFIG.legendNames[i]}</span></div>`;
  }).join('');
}

function renderCaption() {
  document.getElementById('caption').textContent =
    `点線＝基準（${CONFIG.baseline}） ／ 赤＝基準未満（${CONFIG.baseline}未満）`;
}

function draw(values) {
  const svg = document.getElementById('chart');
  svg.innerHTML = '';
  renderGrid(svg);
  renderBaseline(svg);
  renderAxes(svg, values);
  renderDataShape(svg, values);
  renderLegend(values);
}

function randomize() {
  draw(randomValues());
}

document.getElementById('randomizeBtn').addEventListener('click', randomize);
renderCaption();
randomize();
</script>

</body>
</html>
