<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m10 / カレンダー</title>
<link rel="stylesheet" href="../style.css">
<style>

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .cal-nav-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1.1rem;
    padding: 4px 14px;
    cursor: pointer;
    line-height: 1.8;
  }
  .cal-nav-btn:active { opacity: 0.7; }
  .cal-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .cal-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .cal-head {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .cal-dow {
    text-align: center;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 6px 0;
    color: var(--text-soft);
  }
  .cal-dow.sun { color: #e05c5c; }
  .cal-dow.sat { color: #5c8fe0; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cal-cell {
    min-height: 56px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4px 5px;
    box-sizing: border-box;
    position: relative;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty { background: transparent; }
  .cal-cell.today { background: color-mix(in srgb, var(--accent) 12%, transparent); }

  .cell-num {
    font-size: 0.8rem;
    font-weight: 700;
    line-height: 1.4;
    display: block;
  }
  .cal-cell.sun .cell-num,
  .cal-cell.holiday .cell-num { color: #e05c5c; }
  .cal-cell.sat .cell-num { color: #5c8fe0; }
  .cal-cell.today .cell-num {
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
  }

  .cell-holiday {
    font-size: 0.55rem;
    color: #e05c5c;
    line-height: 1.2;
    margin-top: 1px;
    word-break: break-all;
  }
  .cell-event {
    font-size: 0.58rem;
    background: var(--accent);
    color: #fff;
    border-radius: 3px;
    padding: 1px 3px;
    margin-top: 2px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 0.72rem;
    color: var(--text-soft);
    margin-bottom: 12px;
  }
  .legend-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 3px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="../">← トップへ</a>
  <h1 class="page-title">📅 m10 — カレンダー</h1>

  <div class="legend">
    <span><span class="legend-dot" style="background:#e05c5c"></span>日曜・祝日</span>
    <span><span class="legend-dot" style="background:#5c8fe0"></span>土曜</span>
    <span><span class="legend-dot" style="background:var(--accent)"></span>今日</span>
  </div>

  <div id="calA"></div>
  <div id="calB"></div>
</div>

<script type="module">
  // ── 祝日読み込み ─────────────────────────────────────────
  let HOLIDAYS = {};
  try {
    const res = await fetch("../data/holidays.json");
    HOLIDAYS = await res.json();
  } catch(e) {
    console.warn("holidays.json 読み込み失敗", e);
  }

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  // ── カレンダー描画 ───────────────────────────────────────
  function buildCal(year, month, events = {}) {
    // month: 0-indexed
    const label = `${year}年${month + 1}月`;
    const first = new Date(year, month, 1).getDay(); // 0=Sun
    const days  = new Date(year, month + 1, 0).getDate();

    const wrap = document.createElement("div");

    // ナビ行（タイトルのみ、今回はナビ不要）
    const nav = document.createElement("div");
    nav.className = "cal-nav";
    nav.innerHTML = `<span class="cal-title">${label}</span>`;
    wrap.appendChild(nav);

    const calWrap = document.createElement("div");
    calWrap.className = "cal-wrap";

    // 曜日ヘッダ
    const head = document.createElement("div");
    head.className = "cal-head";
    ["日","月","火","水","木","金","土"].forEach((d, i) => {
      const el = document.createElement("div");
      el.className = "cal-dow" + (i===0?" sun":i===6?" sat":"");
      el.textContent = d;
      head.appendChild(el);
    });
    calWrap.appendChild(head);

    // グリッド
    const grid = document.createElement("div");
    grid.className = "cal-grid";

    // 空セル
    for (let i = 0; i < first; i++) {
      const el = document.createElement("div");
      el.className = "cal-cell empty";
      grid.appendChild(el);
    }

    for (let d = 1; d <= days; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dow = (first + d - 1) % 7; // 0=Sun,6=Sat
      const isSun = dow === 0;
      const isSat = dow === 6;
      const isHol = !!HOLIDAYS[dateStr];
      const isToday = dateStr === todayStr;

      const cell = document.createElement("div");
      cell.className = [
        "cal-cell",
        isSun ? "sun" : isSat ? "sat" : "",
        isHol && !isSun ? "holiday" : "",
        isToday ? "today" : "",
      ].filter(Boolean).join(" ");

      // 日付数字
      const num = document.createElement("span");
      num.className = "cell-num";
      num.textContent = d;
      cell.appendChild(num);

      // 祝日名
      if (isHol) {
        const hl = document.createElement("div");
        hl.className = "cell-holiday";
        hl.textContent = HOLIDAYS[dateStr];
        cell.appendChild(hl);
      }

      // 予定（将来用）
      if (events[dateStr]) {
        events[dateStr].forEach(ev => {
          const el = document.createElement("div");
          el.className = "cell-event";
          el.textContent = ev;
          cell.appendChild(el);
        });
      }

      grid.appendChild(cell);
    }
    calWrap.appendChild(grid);
    wrap.appendChild(calWrap);
    return wrap;
  }

  // ── 今月・来月を描画 ────────────────────────────────────
  const y0 = today.getFullYear(), m0 = today.getMonth();
  const y1 = m0 === 11 ? y0 + 1 : y0;
  const m1 = m0 === 11 ? 0 : m0 + 1;

  document.getElementById("calA").appendChild(buildCal(y0, m0));
  document.getElementById("calB").appendChild(buildCal(y1, m1));
</script>

</body>
</html>
