<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m7 / 今日の記録</title>
<link rel="stylesheet" href="../style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    padding: 24px 16px 80px;
  }
  .inner { width: 100%; max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .back-link { font-size: 0.8rem; color: var(--text-soft); text-decoration: none; }
  .back-link:hover { color: var(--accent); }
  .today-label { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .current-score { font-size: 0.82rem; color: var(--text-soft); min-height: 16px; }

  .block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .block-label { font-size: 0.7rem; font-weight: 600; color: var(--text-soft); letter-spacing: 0.06em; }

  input[type="number"] {
    width: 100%;
    font-size: 2.6rem;
    font-weight: 700;
    text-align: center;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--accent);
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }

  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .slider-labels { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text-soft); }

  textarea {
    width: 100%;
    font-size: 0.92rem;
    line-height: 1.65;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    resize: none;
    height: 68px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }

  .buttons { display: flex; gap: 8px; }
  .btn-submit {
    flex: 1; background: var(--accent); color: #fff;
    font-size: 1rem; font-weight: 700; padding: 13px;
    border-radius: 10px; border: none; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-submit:hover { opacity: 0.85; }
  .btn-cancel {
    background: var(--panel); color: var(--danger);
    border: 1px solid var(--danger);
    font-size: 0.85rem; padding: 13px 14px;
    border-radius: 10px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-cancel:hover { opacity: 0.75; }
  .status { font-size: 0.78rem; color: var(--text-soft); min-height: 16px; }

  /* 履歴 */
  .hist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-date { font-size: 0.75rem; color: var(--text-soft); width: 44px; flex-shrink: 0; }
  .hist-date.today { color: var(--accent); font-weight: 700; }
  .hist-bar-wrap { flex: 1; height: 5px; background: var(--accent-soft); border-radius: 3px; overflow: hidden; }
  .hist-bar { height: 100%; background: var(--accent); border-radius: 3px; }
  .hist-score { font-size: 0.85rem; font-weight: 700; color: var(--accent); width: 26px; text-align: right; flex-shrink: 0; }
  .hist-diary { font-size: 0.7rem; color: var(--text-soft); padding: 2px 0 6px 54px; line-height: 1.4; }
</style>
</head>
<body>
<div class="inner">
  <a class="back-link" href="../">← ab トップ</a>
  <div class="today-label" id="todayLabel"></div>
  <div class="current-score" id="currentScore"></div>

  <!-- スコア -->
  <div class="block">
    <div class="block-label">スコア（0〜100）</div>
    <input type="number" id="scoreInput" min="0" max="100" placeholder="—">
    <input type="range" id="scoreSlider" min="0" max="100" value="50">
    <div class="slider-labels"><span>0</span><span>50</span><span>100</span></div>
  </div>

  <!-- 今日一言 + 日記 -->
  <div class="block">
    <div class="block-label">今日の一言</div>
    <textarea id="noteInput" placeholder="今日どんな日だった？"></textarea>
  </div>

  <div class="buttons">
    <button class="btn-submit" id="btnSubmit">保存</button>
    <button class="btn-cancel" id="btnCancel">取消</button>
  </div>
  <div class="status" id="status"></div>

  <!-- 履歴 -->
  <div class="block">
    <div class="block-label">直近の記録</div>
    <div id="histList"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDuPw8nMuFWx8ghV5ZeBGETeiNII3uk4l8",
    authDomain: "ab01-9f35a.firebaseapp.com",
    projectId: "ab01-9f35a"
  });
  const db = getFirestore(app);

  const now = new Date();
  const dateStr = now.getFullYear() + "-" +
    String(now.getMonth()+1).padStart(2,"0") + "-" +
    String(now.getDate()).padStart(2,"0");

  document.getElementById("todayLabel").textContent =
    now.getFullYear() + "年" + (now.getMonth()+1) + "月" + now.getDate() + "日";

  const numInput = document.getElementById("scoreInput");
  const slider   = document.getElementById("scoreSlider");
  numInput.addEventListener("input", () => { if (numInput.value !== "") slider.value = numInput.value; });
  slider.addEventListener("input", () => { numInput.value = slider.value; });

  function fmt(s) { const [,m,d] = s.split("-"); return `${parseInt(m)}/${parseInt(d)}`; }

  async function load() {
    try {
      const snap = await getDocs(collection(db, "ab_items2"));
      const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
      const items = [];
      snap.forEach(d => {
        const data = d.data(); const id = d.id;
        if (DATE_RE.test(id) && !isNaN(Number(data.col2)) && Number(data.col2) >= 0 && Number(data.col2) <= 100)
          items.push({ date: id, score: Number(data.col2), note: data.col3 || "" });
      });
      items.sort((a,b) => b.date.localeCompare(a.date));

      const todayItem = items.find(i => i.date === dateStr);
      if (todayItem) {
        numInput.value = todayItem.score;
        slider.value   = todayItem.score;
        document.getElementById("noteInput").value = todayItem.note;
        document.getElementById("currentScore").textContent = `記録済: ${todayItem.score}点`;
      } else {
        document.getElementById("currentScore").textContent = "本日の記録はまだありません";
      }

      const hist = document.getElementById("histList");
      hist.innerHTML = "";
      items.slice(0, 3).forEach(({ date, score, note }) => {
        const isToday = date === dateStr;
        const wrap = document.createElement("div");
        wrap.innerHTML = `
          <div class="hist-item">
            <span class="hist-date ${isToday ? 'today' : ''}">${fmt(date)}</span>
            <div class="hist-bar-wrap"><div class="hist-bar" style="width:${score}%"></div></div>
            <span class="hist-score">${score}</span>
          </div>
          ${note ? `<div class="hist-diary">${note}</div>` : ""}
        `;
        hist.appendChild(wrap);
      });
    } catch(e) {
      document.getElementById("status").textContent = "読込エラー: " + e.message;
    }
  }

  document.getElementById("btnSubmit").addEventListener("click", async () => {
    const val = parseInt(numInput.value);
    if (isNaN(val) || val < 0 || val > 100) {
      document.getElementById("status").textContent = "0〜100の数字を入力してください"; return;
    }
    const note = document.getElementById("noteInput").value.trim();
    document.getElementById("status").textContent = "保存中...";
    try {
      await setDoc(doc(db, "ab_items2", dateStr), {
        col1: dateStr, col2: String(val), col3: note, createdAt: new Date().toISOString()
      });
      document.getElementById("currentScore").textContent = `記録済: ${val}点`;
      document.getElementById("status").textContent = "保存しました ✓";
      await load();
    } catch(e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  });

  document.getElementById("btnCancel").addEventListener("click", async () => {
    if (!confirm("今日の記録を削除しますか？")) return;
    try {
      await deleteDoc(doc(db, "ab_items2", dateStr));
      numInput.value = ""; slider.value = 50;
      document.getElementById("noteInput").value = "";
      document.getElementById("currentScore").textContent = "本日の記録はまだありません";
      document.getElementById("status").textContent = "削除しました";
      await load();
    } catch(e) {
      document.getElementById("status").textContent = "エラー: " + e.message;
    }
  });

  load();
</script>
</body>
</html>
