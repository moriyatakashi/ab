<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lib / test</title>
<style>
  body { font-family: -apple-system, monospace; background: #0f0f14; color: #ccc; padding: 20px; }
  h1 { font-size: 1rem; color: #f0c040; margin-bottom: 4px; }
  .sub { font-size: 0.72rem; color: #555; margin-bottom: 20px; }
  .suite { margin-bottom: 20px; }
  .suite-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 8px; }
  .test { display: flex; gap: 10px; align-items: flex-start; font-size: 0.82rem; padding: 5px 0; border-bottom: 1px solid #1a1a22; }
  .badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
  .badge.ok   { background: #1a3a1a; color: #4ec94e; }
  .badge.fail { background: #3a1a1a; color: #f08060; }
  .badge.skip { background: #2a2a1a; color: #888; }
  .badge.running { background: #1a2a3a; color: #6ab0f0; }
  .test-name { flex: 1; }
  .test-detail { font-size: 0.72rem; color: #666; margin-top: 2px; }
  .summary { margin-top: 24px; font-size: 0.85rem; padding: 12px 16px; border-radius: 8px; }
  .summary.all-ok   { background: #1a3a1a; color: #4ec94e; }
  .summary.has-fail { background: #3a1a1a; color: #f08060; }
  a.back { font-size: 0.72rem; color: #555; text-decoration: none; display: inline-block; margin-bottom: 16px; }

  /* input テスト */
  .input-test-area { background: #1a1a22; border-radius: 8px; padding: 12px; margin-top: 8px; }
  .input-test-area p { font-size: 0.75rem; color: #666; margin-bottom: 8px; }
  .btn-row { display: flex; gap: 8px; }
  .test-btn {
    flex: 1; padding: 10px; background: #16213e; border: 1px solid #2a2a4a;
    border-radius: 8px; color: #888; font-size: 0.8rem; cursor: pointer;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .test-btn.on { background: #2a2a5e; color: #fff; }
  .key-disp { font-size: 0.72rem; color: #4ec94e; margin-top: 8px; min-height: 1.4em; }

  /* gameloop テスト */
  #loopCanvas { display: block; width: 100%; height: 60px; background: #1a1a22; border-radius: 8px; margin-top: 8px; }

  /* 異常系テスト */
  .neg-section { margin-top: 32px; border-top: 1px solid #1a1a22; padding-top: 20px; }
  .neg-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #f08060; margin-bottom: 12px; }
  .neg-log { font-family: monospace; font-size: 0.75rem; background: #0d0d12; border-radius: 8px; padding: 10px 12px; max-height: 220px; overflow-y: auto; margin-top: 8px; }
  .neg-row { padding: 3px 0; border-bottom: 1px solid #111; display: flex; gap: 8px; align-items: flex-start; }
  .neg-badge { font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
  .neg-badge.caught  { background: #1a3a1a; color: #4ec94e; }
  .neg-badge.leaked  { background: #3a1a1a; color: #f08060; }
  .neg-badge.info    { background: #1a2a3a; color: #6ab0f0; }
  .neg-text { flex: 1; color: #aaa; }
  .neg-text .what  { color: #888; font-size: 0.7rem; }
  .neg-text .err   { color: #f08060; font-size: 0.7rem; margin-top: 2px; }
  .neg-text .ok    { color: #4ec94e; font-size: 0.7rem; margin-top: 2px; }
  .neg-btn { background: #1a1a22; border: 1px solid #f08060; color: #f08060; border-radius: 8px; padding: 9px 18px; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
  .neg-btn:hover { background: #2a1a1a; }
  .neg-manual { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .neg-manual label { font-size: 0.68rem; color: #666; letter-spacing: 0.06em; text-transform: uppercase; }
  .neg-select { background: #1a1a22; border: 1px solid #2a2a4a; color: #ccc; border-radius: 6px; padding: 7px 10px; font-size: 0.8rem; }
  .neg-input  { background: #1a1a22; border: 1px solid #2a2a4a; color: #ccc; border-radius: 6px; padding: 7px 10px; font-size: 0.8rem; font-family: monospace; }
  .neg-run { background: #2a1a1a; border: 1px solid #f08060; color: #f08060; border-radius: 6px; padding: 8px 16px; font-size: 0.8rem; cursor: pointer; }
  .neg-run:hover { background: #3a2020; }
  .neg-summary { font-size: 0.75rem; margin-top: 6px; color: #888; }
</style>
</head>
<body>
<a class="back" href="../">← ab</a>
<h1>lib / test</h1>
<p class="sub">各ライブラリの動作確認。ブラウザで開くだけでテストが走ります。</p>

<div id="results"></div>
<div class="summary" id="summary">実行中...</div>

  <div class="neg-section">
    <div class="neg-title">⚠ 異常系テスト（ネガティブテスト）</div>

    <div style="font-size:0.72rem; color:#555; margin-bottom:12px; line-height:1.6;">
      バリデーションが正しく機能するか確認。<br>
      🟢 CAUGHT = 想定通りエラーを捕捉<br>
      🔴 LEAKED = エラーが出るべきなのに出なかった（バグ）
    </div>

    <!-- ① 自動ランダム投入 -->
    <button class="neg-btn" id="btnRandom">🎲 ランダムな異常値を自動投入</button>
    <div class="neg-summary" id="negSummary"></div>
    <div class="neg-log" id="negLog"></div>

    <!-- ② 手動入力 -->
    <div class="neg-manual">
      <div style="font-size:0.68rem; color:#f08060; letter-spacing:0.06em; text-transform:uppercase; margin-top:16px;">手動テスト</div>
      <label>テスト対象</label>
      <select class="neg-select" id="manualTarget">
        <option value="score_score">ScoreManager.saveResult — score引数</option>
        <option value="score_histCol">ScoreManager — histCol引数</option>
        <option value="score_n">ScoreManager.loadHistory — n引数</option>
        <option value="input_elementId">Input.bind — elementId引数</option>
        <option value="input_keyName">Input.bind — keyName引数</option>
        <option value="gameloop_update">GameLoop — update引数</option>
        <option value="gameloop_maxDt">GameLoop — maxDt引数</option>
      </select>
      <label>入力値（JS式として評価されます）</label>
      <input class="neg-input" id="manualValue" type="text" placeholder='例: null, "", -1, "abc", [], NaN'>
      <button class="neg-run" id="btnManual">▶ 実行</button>
      <div class="neg-log" id="manualLog" style="margin-top:4px;"></div>
    </div>
  </div>


<script type="module">
import { db }          from "./firebase.js";
import { ScoreManager } from "./score.js";
import { Input }        from "./input.js";
import { GameLoop }     from "./gameloop.js";

const results = document.getElementById("results");
let passed = 0, failed = 0;

// ── テストユーティリティ ──────────────────────────
function suite(name) {
  const div = document.createElement("div");
  div.className = "suite";
  div.innerHTML = `<div class="suite-title">${name}</div>`;
  results.appendChild(div);
  return div;
}

function testRow(container, name, status, detail = "") {
  const row = document.createElement("div");
  row.className = "test";
  row.innerHTML = `
    <span class="badge ${status}">${status === "ok" ? "OK" : status === "fail" ? "FAIL" : status === "skip" ? "SKIP" : "..."}</span>
    <div class="test-name">${name}${detail ? `<div class="test-detail">${detail}</div>` : ""}</div>
  `;
  container.appendChild(row);
  return row;
}

async function runTest(container, name, fn) {
  const row = testRow(container, name, "running");
  try {
    const detail = await fn();
    row.querySelector(".badge").className = "badge ok";
    row.querySelector(".badge").textContent = "OK";
    if (detail) row.querySelector(".test-name").innerHTML += `<div class="test-detail">${detail}</div>`;
    passed++;
  } catch(e) {
    row.querySelector(".badge").className = "badge fail";
    row.querySelector(".badge").textContent = "FAIL";
    row.querySelector(".test-name").innerHTML += `<div class="test-detail">${e.message}</div>`;
    failed++;
  }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "assertion failed");
}

// ── Suite 1: firebase.js ──────────────────────────
const s1 = suite("1. firebase.js — 初期化・接続");

await runTest(s1, "db オブジェクトが存在する", () => {
  assert(db !== null && db !== undefined, "db is null/undefined");
  assert(typeof db === "object", "db is not object");
  return `projectId: ab01-9f35a`;
});

await runTest(s1, "Firestoreに疎通できる（テストドキュメント読み込み）", async () => {
  const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  // 存在しないドキュメントでもエラーなく返ればOK
  const d = await getDoc(doc(db, "ab_runner_hi", "record"));
  assert(d !== undefined, "getDoc returned undefined");
  return d.exists() ? `ドキュメント存在 score=${d.data().score}` : "ドキュメントなし（正常）";
});

// ── Suite 2: score.js ─────────────────────────────
const s2 = suite("2. score.js — スコア管理");
const sm = new ScoreManager(db, "ab_lib_test_hist", "ab_lib_test_hi");

await runTest(s2, "ScoreManager インスタンス生成", () => {
  assert(sm instanceof ScoreManager, "not ScoreManager");
  return "histCol=ab_lib_test_hist";
});

await runTest(s2, "loadHi() — 最高得点読み込み", async () => {
  const hi = await sm.loadHi();
  assert(typeof hi === "number", "hiScore is not number");
  return `hiScore=${hi}`;
});

await runTest(s2, "saveResult() — スコア書き込み", async () => {
  const testScore = 999;
  await sm.saveResult(testScore, { wave: 0, _test: true });
  return `score=${testScore} 書き込みOK`;
});

await runTest(s2, "loadHistory() — 履歴読み込み", async () => {
  const rows = await sm.loadHistory(5);
  assert(Array.isArray(rows), "not array");
  assert(rows.length > 0, "履歴が0件（saveResult後なのに）");
  return `${rows.length}件取得`;
});

await runTest(s2, "最高得点が正しく更新される", async () => {
  const sm2 = new ScoreManager(db, "ab_lib_test_hist", "ab_lib_test_hi");
  await sm2.loadHi();
  const before = sm2.hiScore;
  const big = before + 10000;
  await sm2.saveResult(big, { _test: true });
  assert(sm2.hiScore === big, `hiScore=${sm2.hiScore} (expected ${big})`);
  return `${before} → ${big}`;
});

// ── Suite 3: input.js ─────────────────────────────
const s3 = suite("3. input.js — タッチ・キーボード入力");

await runTest(s3, "Input インスタンス生成", () => {
  const inp = new Input();
  assert(inp.keys !== undefined, "keys undefined");
  return "keys オブジェクト生成OK";
});

await runTest(s3, "bind() でボタン要素を登録できる", () => {
  // テスト用ボタンを動的生成して登録
  const btn = document.createElement("button");
  btn.id = "_testBtn";
  btn.style.display = "none";
  document.body.appendChild(btn);
  const inp = new Input();
  inp.bind("_testBtn", "left");
  btn.remove();
  return "bind() 正常終了";
});

// インタラクティブテスト（手動）
{
  const row = document.createElement("div");
  row.className = "test";
  row.innerHTML = `
    <span class="badge skip">手動</span>
    <div class="test-name">
      タッチ・キー入力の確認（手動）
      <div class="input-test-area">
        <p>ボタンを押す or キー（←→スペース）を押すと反応を確認できます</p>
        <div class="btn-row">
          <button class="test-btn" id="tLeft">◀</button>
          <button class="test-btn" id="tFire">FIRE</button>
          <button class="test-btn" id="tRight">▶</button>
        </div>
        <div class="key-disp" id="keyDisp">—</div>
      </div>
    </div>
  `;
  s3.appendChild(row);

  const inp2 = new Input();
  inp2.bind("tLeft",  "left");
  inp2.bind("tFire",  "fire");
  inp2.bind("tRight", "right");

  setInterval(() => {
    const active = Object.entries(inp2.keys).filter(([,v]) => v).map(([k]) => k);
    document.getElementById("keyDisp").textContent = active.length ? active.join(" + ") : "—";
  }, 50);
}

// ── Suite 4: gameloop.js ──────────────────────────
const s4 = suite("4. gameloop.js — ゲームループ");

await runTest(s4, "GameLoop インスタンス生成", () => {
  const gl = new GameLoop({ update: () => {}, draw: () => {} });
  assert(gl !== null, "null");
  assert(!gl.running, "初期状態でrunningがtrue");
  return "running=false (正常)";
});

await runTest(s4, "start() / stop() が動作する", async () => {
  let updateCount = 0;
  const gl = new GameLoop({
    update: () => updateCount++,
    draw:   () => {}
  });
  gl.start();
  assert(gl.running, "start後にrunning=false");
  await new Promise(r => setTimeout(r, 100));
  gl.stop();
  assert(!gl.running, "stop後にrunning=true");
  assert(updateCount > 0, `updateが呼ばれていない (count=${updateCount})`);
  return `100ms間に update ${updateCount}回呼ばれた`;
});

await runTest(s4, "dt（経過時間）が妥当な範囲に収まる", async () => {
  const dts = [];
  const gl = new GameLoop({
    update: (dt) => dts.push(dt),
    draw:   () => {},
    maxDt:  100
  });
  gl.start();
  await new Promise(r => setTimeout(r, 200));
  gl.stop();
  const max = Math.max(...dts);
  const avg = dts.reduce((a,b)=>a+b,0) / dts.length;
  assert(max <= 100, `maxDt超過: ${max.toFixed(1)}ms`);
  return `avg=${avg.toFixed(1)}ms max=${max.toFixed(1)}ms (${dts.length}フレーム)`;
});

// ループ視覚確認
{
  const row = document.createElement("div");
  row.className = "test";
  row.innerHTML = `
    <span class="badge skip">目視</span>
    <div class="test-name">
      ループ動作の目視確認（球が動いていればOK）
      <canvas id="loopCanvas"></canvas>
    </div>
  `;
  s4.appendChild(row);

  const c = document.getElementById("loopCanvas");
  c.width  = c.offsetWidth || 300;
  c.height = 60;
  const cx = c.getContext("2d");
  let bx = 0;
  const visLoop = new GameLoop({
    update: (dt) => { bx = (bx + dt * 0.1) % c.width; },
    draw: () => {
      cx.fillStyle = "#1a1a22"; cx.fillRect(0,0,c.width,c.height);
      cx.fillStyle = "#f0c040";
      cx.beginPath(); cx.arc(bx, 30, 10, 0, Math.PI*2); cx.fill();
    }
  });
  visLoop.start();
}


// ── 異常系テスト ──────────────────────────────────────
const RANDOM_BADS = [
  null, undefined, "", "  ", 0, -1, -999, NaN, Infinity, -Infinity,
  "abc", "123abc", [], {}, true, false, () => {}, Symbol("x"),
  new Date(), 9999999
];

function badLabel(v) {
  if (v === null)      return "null";
  if (v === undefined) return "undefined";
  if (typeof v === "function") return "function(){}";
  if (typeof v === "symbol")   return "Symbol";
  if (v instanceof Date)       return "Date";
  if (Array.isArray(v))        return "[]（配列）";
  if (typeof v === "object")   return "{}（オブジェクト）";
  return JSON.stringify(v);
}

function negLog(containerId, caught, what, message) {
  const log = document.getElementById(containerId);
  const row = document.createElement("div");
  row.className = "neg-row";
  const badge = caught ? "caught" : "leaked";
  const label = caught ? "CAUGHT" : "LEAKED";
  const cls   = caught ? "ok" : "err";
  row.innerHTML = '<span class="neg-badge ' + badge + '">' + label + '</span>'
    + '<div class="neg-text"><div class="what">' + what + '</div>'
    + '<div class="' + cls + '">' + message + '</div></div>';
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
}

const NEG_CASES = [
  {
    label: "ScoreManager(db, {空文字系}, 'x')",
    fn: async (val) => { new ScoreManager(db, val, "x"); },
    arg: () => [null, undefined, "", "  ", 0, 123][Math.floor(Math.random() * 6)],
    shouldThrow: true
  },
  {
    label: "ScoreManager(db, 'x', {空文字系})",
    fn: async (val) => { new ScoreManager(db, "x", val); },
    arg: () => [null, undefined, "", "  ", 0, 123][Math.floor(Math.random() * 6)],
    shouldThrow: true
  },
  {
    label: "saveResult(score={変な値})",
    fn: async (val) => {
      const sm2 = new ScoreManager(db, "ab_lib_test_hist", "ab_lib_test_hi");
      await sm2.saveResult(val);
    },
    arg: () => [null, undefined, "", "abc", NaN, Infinity, -1, -999, [], {}][Math.floor(Math.random() * 10)],
    shouldThrow: true
  },
  {
    label: "loadHistory(n={変な値})",
    fn: async (val) => {
      const sm2 = new ScoreManager(db, "ab_lib_test_hist", "ab_lib_test_hi");
      await sm2.loadHistory(val);
    },
    arg: () => [0, -1, null, "10", 1.5, NaN, Infinity][Math.floor(Math.random() * 7)],
    shouldThrow: true
  },
  {
    label: "Input.bind(elementId={変な値}, 'left')",
    fn: async (val) => { const inp = new Input(); inp.bind(val, "left"); },
    arg: () => [null, undefined, "", 123, [], {}][Math.floor(Math.random() * 6)],
    shouldThrow: true
  },
  {
    label: "GameLoop(update={関数以外})",
    fn: async (val) => { new GameLoop({ update: val, draw: () => {} }); },
    arg: () => [null, undefined, "fn", 0, [], {}][Math.floor(Math.random() * 6)],
    shouldThrow: true
  },
  {
    label: "GameLoop(maxDt={変な値})",
    fn: async (val) => { new GameLoop({ update: () => {}, draw: () => {}, maxDt: val }); },
    arg: () => [0, -1, null, "100", NaN, Infinity, -Infinity][Math.floor(Math.random() * 7)],
    shouldThrow: true
  },
];

let negPassed = 0, negFailed = 0;

async function runNegCase(tc, containerId) {
  const val = tc.arg();
  const label = tc.label + " ← " + badLabel(val);
  try {
    await tc.fn(val);
    if (tc.shouldThrow) {
      negLog(containerId, false, label, "エラーが出るべきなのに出なかった（バリデーション漏れ）");
      negFailed++;
    } else {
      negLog(containerId, true, label, "正常終了（想定通り）");
      negPassed++;
    }
  } catch(e) {
    if (tc.shouldThrow) {
      negLog(containerId, true, label, e.message);
      negPassed++;
    } else {
      negLog(containerId, false, label, "エラーが出るべきでないのに出た: " + e.message);
      negFailed++;
    }
  }
}

document.getElementById("btnRandom").addEventListener("click", async () => {
  document.getElementById("negLog").innerHTML = "";
  negPassed = 0; negFailed = 0;
  const shuffled = [...NEG_CASES].sort(() => Math.random() - 0.5);
  for (const tc of shuffled) await runNegCase(tc, "negLog");
  const sumEl2 = document.getElementById("negSummary");
  sumEl2.textContent = negPassed + " CAUGHT / " + negFailed + " LEAKED";
  sumEl2.style.color = negFailed === 0 ? "#4ec94e" : "#f08060";
});

document.getElementById("btnManual").addEventListener("click", async () => {
  const target = document.getElementById("manualTarget").value;
  const rawVal = document.getElementById("manualValue").value.trim();
  document.getElementById("manualLog").innerHTML = "";
  let val;
  try {
    val = Function('"use strict"; return (' + rawVal + ')')();
  } catch(e) {
    negLog("manualLog", false, "入力値のパース失敗", "JS式として評価できません: " + e.message);
    return;
  }
  const MANUAL_FNS = {
    score_score:     async (v) => { const s = new ScoreManager(db, "ab_lib_test_hist", "ab_lib_test_hi"); await s.saveResult(v); },
    score_histCol:   async (v) => { new ScoreManager(db, v, "ab_lib_test_hi"); },
    score_n:         async (v) => { const s = new ScoreManager(db, "ab_lib_test_hist", "ab_lib_test_hi"); await s.loadHistory(v); },
    input_elementId: async (v) => { const inp = new Input(); inp.bind(v, "left"); },
    input_keyName:   async (v) => { const inp = new Input(); inp.bind("btnLeft", v); },
    gameloop_update: async (v) => { new GameLoop({ update: v, draw: () => {} }); },
    gameloop_maxDt:  async (v) => { new GameLoop({ update: () => {}, draw: () => {}, maxDt: v }); },
  };
  const label = target + " ← " + badLabel(val);
  try {
    await MANUAL_FNS[target](val);
    negLog("manualLog", false, label, "エラーなし（エラーが出るべきなら LEAKED）");
  } catch(e) {
    negLog("manualLog", true, label, e.message);
  }
});
// ────────────────────────────────────────────────

// ── サマリー ──────────────────────────────────────
const sumEl = document.getElementById("summary");
sumEl.textContent  = `${passed} passed / ${failed} failed`;
sumEl.className    = `summary ${failed === 0 ? "all-ok" : "has-fail"}`;
</script>
</body>
</html>
