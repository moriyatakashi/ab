<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m2 / 今日の記録</title>
<link rel="stylesheet" href="../style.css">
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:20px; }
  .back-link:hover { color:var(--accent); }

  /* セクション */
  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin: 0 0 14px;
  }

  /* スコア */
  .score-display {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .score-num {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    min-width: 64px;
    text-align: center;
    line-height: 1;
  }
  .score-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--accent-soft);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .score-date {
    font-size: 0.78rem;
    color: var(--text-soft);
  }
  .note-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .note-input:focus { outline: none; border-color: var(--accent); }

  .btn-save-score {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .score-saved {
    font-size: 0.78rem;
    color: var(--text-soft);
    margin-top: 8px;
    text-align: center;
    min-height: 1.2em;
  }

  /* 訪問記録 */
  .visit-form { display: flex; flex-direction: column; gap: 10px; }
  .visit-form input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
  }
  .visit-form input:focus { outline: none; border-color: var(--accent); }
  .visit-row-inputs { display: flex; gap: 8px; }
  .visit-row-inputs input { flex: 1; }
  .btn-gps {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .btn-add-visit {
    width: 100%;
    padding: 12px;
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
  }

  /* 履歴 */
  .history-section { margin-top: 24px; }
  .history-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 10px;
  }
  .day-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .day-date { font-size: 0.9rem; font-weight: 700; }
  .day-dow { font-size: 0.75rem; color: var(--text-soft); }
  .score-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
  }
  .score-label { font-size: 0.7rem; color: var(--text-soft); width: 36px; }
  .bar-wrap { flex:1; height:5px; background:var(--accent-soft); border-radius:3px; overflow:hidden; }
  .bar { height:100%; background:var(--accent); border-radius:3px; }
  .score-val { font-size:1.1rem; font-weight:700; color:var(--accent); min-width:34px; text-align:right; }
  .score-note { font-size:0.75rem; color:var(--text-soft); padding-left:46px; margin-bottom:6px; }
  .visit-item {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 0.82rem; color: var(--text); padding: 4px 0;
  }
  .visit-item-icon { color: var(--text-soft); flex-shrink: 0; }
  .visit-item-place { font-weight: 600; }
  .visit-item-time { color: var(--text-soft); font-size: 0.72rem; }
  .check-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .review-banner {
    display: flex; align-items: center; gap: 14px;
    background: var(--accent); color: #fff;
    border-radius: 12px; padding: 16px 18px; margin-bottom: 12px;
    text-decoration: none; transition: opacity 0.15s;
  }
  .review-banner:hover { opacity: 0.88; }
  .review-banner-icon { font-size: 1.6rem; flex-shrink: 0; }
  .review-banner-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
  .review-banner-sub { font-size: 0.75rem; opacity: 0.85; }
  .review-section {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .review-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-soft); flex-shrink: 0; }
  .review-input {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 0.88rem; background: var(--bg); color: var(--text);
  }
  .review-input:focus { outline: none; border-color: var(--accent); }
  .review-saved { font-size: 0.72rem; color: var(--accent); flex-shrink: 0; min-width: 2em; }
  .check-tag {
    font-size: 0.68rem; color: var(--accent);
    background: var(--accent-soft); border-radius: 10px;
    padding: 2px 8px; pointer-events: none;
  }

  .updated { font-size:0.72rem; color:var(--text-soft); margin-top:32px; text-align:right; }

  /* チェック項目 */
  .check-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .check-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .check-item:last-child { border-bottom: none; }
  .check-box {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.85rem; transition: all 0.15s;
  }
  .check-box.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
  .check-label { font-size: 0.9rem; font-weight: 600; color: var(--text); flex: 1; }
  .check-done { font-size: 0.72rem; color: var(--text-soft); }
  .check-item.done .check-label { color: var(--text-soft); text-decoration: line-through; }

  /* 日付確認バナー */
  .date-confirm {
    background: #fff8e8; border: 1px solid #f0c040;
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 12px; display: none;
  }
  .date-confirm.show { display: flex; align-items: center; gap: 10px; }
  .date-confirm-text { font-size: 0.82rem; color: #7a6020; flex: 1; }
  .date-confirm-btns { display: flex; gap: 6px; }
  .date-btn {
    font-size: 0.75rem; padding: 5px 10px; border-radius: 6px;
    border: 1px solid #f0c040; background: #fff; color: #7a6020; cursor: pointer;
  }
  .date-btn.primary { background: #f0c040; color: #1a1a00; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>
  <h1>今日の記録</h1>


  <!-- 日付確認バナー -->
  <div class="date-confirm" id="dateConfirm">
    <div class="date-confirm-text" id="dateConfirmText"></div>
    <div class="date-confirm-btns">
      <button class="date-btn primary" id="dateConfirmYes">はい</button>
      <button class="date-btn" id="dateConfirmNo" id="dateConfirmNo">変更する</button>
    </div>
  </div>

  <!-- チェック項目 -->
  <div class="check-section" id="checkSection">
    <div class="section-title">チェック</div>
    <div class="check-item" id="checkMidnight" data-key="crossed_midnight">
      <div class="check-box" id="boxMidnight"></div>
      <div class="check-label">日を跨いだ</div>
      <div class="check-done" id="doneMidnight"></div>
    </div>
    <div class="check-item" id="checkMeal" data-key="ate_meal">
      <div class="check-box" id="boxMeal"></div>
      <div class="check-label">ご飯食べた</div>
      <div class="check-done" id="doneMeal"></div>
    </div>
  </div>

  <!-- スコア入力 -->
  <div class="section">
    <div class="section-title">スコア</div>
    <div class="score-display">
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-bar-wrap">
        <input type="range" id="slider" min="0" max="100" value="50">
        <div class="score-date" id="scoreDate"></div>
      </div>
    </div>
    <input class="note-input" id="noteInput" type="text" placeholder="一言メモ（任意）">
    <button class="btn-save-score" id="btnSaveScore">保存</button>
    <div class="score-saved" id="scoreSaved"></div>
  </div>

  <!-- 訪問記録 -->
  <div class="section">
    <div class="section-title">訪問記録</div>
    <div class="visit-form">
      <div class="visit-row-inputs">
        <input type="text" id="placeInput" placeholder="場所">
        <button class="btn-gps" id="btnGps">📍 現在地</button>
      </div>
      <div class="visit-row-inputs">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
      </div>
      <input type="text" id="memoInput" placeholder="メモ（任意）">
      <button class="btn-add-visit" id="btnAddVisit">＋ 追加</button>
    </div>
    <div class="status" id="visitStatus"></div>
  </div>

  <!-- 履歴 -->
  <div class="history-section">
    <div class="history-label">直近の記録</div>
    <div id="historyList"></div>
    <p class="empty" id="emptyMsg" style="display:none;">記録はまだありません</p>
    <a href="../m1/" style="display:block; text-align:center; font-size:0.8rem; color:var(--accent); padding:12px 0; text-decoration:none;">もっと見る →</a>
  </div>

  <p class="updated">更新: 2026-06-28 08:13</p>
</div>

<script>alert("[C-0] 通常スクリプトOK");</script>
<script type="module">
alert("[C-1] moduleスクリプト開始");
  try { from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, getDoc, addDoc, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDuPw8nMuFWx8ghV5ZeBGETeiNII3uk4l8",
    authDomain: "ab01-9f35a.firebaseapp.com",
    projectId: "ab01-9f35a"
  });
  const db = getFirestore(app);
  alert("[C-1.5] Firebase初期化OK");

  const SCORE_COL = "ab_items2";
  const VISIT_COL = "ab_visits";
  const DATE_RE   = /^\d{4}-\d{2}-\d{2}$/;
  const DOW       = ["日","月","火","水","木","金","土"];

  // 今日の日付をセット
  const today = new Date().toLocaleDateString("sv-SE");
  document.getElementById("scoreDate").textContent = today;
  document.getElementById("dateInput").value = today;
  const now = new Date();
  document.getElementById("timeInput").value =
    String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");


  // ── チェック項目 ──────────────────────────────────────
  const CHECK_COL = "ab_checks";
  let checkData = { crossed_midnight: false, ate_meal: false };

  async function loadChecks(date) {
    try {
      const d = await getDoc(doc(db, CHECK_COL, date));
      if (d.exists()) {
        const data = d.data();
        checkData = { ...checkData, ...data };
        // 振り返り日を復元
        if (data.reviewDate) {
          document.getElementById("reviewDate").value = data.reviewDate;
          // 今日が振り返り日かチェック
          const reviewDateVal = data.reviewDate;
          const todayVal = new Date().toLocaleDateString("sv-SE");
          if (reviewDateVal === todayVal) {
            document.getElementById("reviewBanner").style.display = "flex";
          } else {
            document.getElementById("reviewBanner").style.display = "none";
          }
        } else {
          document.getElementById("reviewBanner").style.display = "none";
        }
      }
    } catch(e) {}
    renderChecks();
  }

  async function saveCheck(key, value) {
    checkData[key] = value;
    try {
      const reviewDate = document.getElementById("reviewDate").value;
      await setDoc(doc(db, CHECK_COL, document.getElementById("dateInput").value), {
        ...checkData,
        date: document.getElementById("dateInput").value,
        reviewDate: reviewDate || null,
        updatedAt: new Date().toISOString()
      });
    } catch(e) { console.warn("check save failed:", e); }
    renderChecks();
  }

  function renderChecks() {
    [
      { key: "crossed_midnight", boxId: "boxMidnight", itemId: "checkMidnight", doneId: "doneMidnight" },
      { key: "ate_meal",         boxId: "boxMeal",     itemId: "checkMeal",     doneId: "doneMeal" }
    ].forEach(({ key, boxId, itemId, doneId }) => {
      const checked = checkData[key];
      const box  = document.getElementById(boxId);
      const item = document.getElementById(itemId);
      const done = document.getElementById(doneId);
      box.textContent  = checked ? "✓" : "";
      box.className    = "check-box" + (checked ? " checked" : "");
      item.className   = "check-item" + (checked ? " done" : "");
      done.textContent = checked ? "済" : "";
    });
  }

  // 振り返り日を変更したら即保存
  document.getElementById("reviewDate").addEventListener("change", async () => {
    const date = document.getElementById("dateInput").value;
    const reviewDate = document.getElementById("reviewDate").value;
    const saved = document.getElementById("reviewSaved");
    try {
      await setDoc(doc(db, CHECK_COL, date), {
        ...checkData,
        date,
        reviewDate: reviewDate || null,
        updatedAt: new Date().toISOString()
      });
      saved.textContent = "✓";
      setTimeout(() => saved.textContent = "", 2000);
      // バナー更新
      const todayVal = new Date().toLocaleDateString("sv-SE");
      document.getElementById("reviewBanner").style.display =
        reviewDate === todayVal ? "flex" : "none";
    } catch(e) { console.warn("review save failed:", e); }
  });

  document.getElementById("checkMidnight").addEventListener("click", () => {
    saveCheck("crossed_midnight", !checkData.crossed_midnight);
  });
  document.getElementById("checkMeal").addEventListener("click", () => {
    saveCheck("ate_meal", !checkData.ate_meal);
  });

  // ── 日付確認バナー ────────────────────────────────────
  function showDateConfirm() {
    const now  = new Date();
    const h    = now.getHours();
    const m    = now.getMinutes();
    const hm   = h * 60 + m;

    // 22:15〜23:59 または 0:00〜7:00 の場合に表示
    const isLateNight  = hm >= 22 * 60 + 15;
    const isEarlyMorning = hm < 7 * 60;
    if (!isLateNight && !isEarlyMorning) return;

    const confirmEl = document.getElementById("dateConfirm");
    const textEl    = document.getElementById("dateConfirmText");

    if (isLateNight) {
      const d = now.getDate();
      const m2 = now.getMonth() + 1;
      textEl.textContent = `⚠️ ${m2}/${d}（今日）の記録でいいですか？`;
    } else {
      // 0:00〜7:00 → 前日を提案
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const d = yesterday.getDate();
      const m2 = yesterday.getMonth() + 1;
      textEl.textContent = `⚠️ ${m2}/${d}（昨日）の記録ですか？`;
      // 「はい」で前日にセット
      document.getElementById("dateConfirmYes").addEventListener("click", () => {
        const yStr = yesterday.toLocaleDateString("sv-SE");
        document.getElementById("dateInput").value  = yStr;
        document.getElementById("scoreDate").textContent = yStr;
        loadChecks(yStr);
        loadTodayScore(yStr);
        confirmEl.classList.remove("show");
      }, { once: true });
    }

    confirmEl.classList.add("show");
    document.getElementById("dateConfirmYes").addEventListener("click", () => {
      confirmEl.classList.remove("show");
    }, { once: true });
    document.getElementById("dateConfirmNo").addEventListener("click", () => {
      confirmEl.classList.remove("show");
      document.getElementById("dateInput").focus();
    });
  }

  // スライダー ↔ 数値 双方向連動
  const slider   = document.getElementById("slider");
  const scoreNum = document.getElementById("scoreNum");

  function setScore(val) {
    const v = Math.min(100, Math.max(0, Number(val)));
    slider.value        = v;
    scoreNum.textContent = v;
  }

  slider.addEventListener("input", () => {
    scoreNum.textContent = slider.value;
  });

  // 今日のスコアをFirestoreから読み込む
  async function loadTodayScore(date) {
    const saveBtn = document.getElementById("btnSaveScore");
    try {
      const d = await getDoc(doc(db, SCORE_COL, date));
      if (d.exists()) {
        const data = d.data();
        const v = Number(data.col2);
        if (!isNaN(v)) {
          setScore(v);
          document.getElementById("noteInput").value = data.col3 || "";
          saveBtn.textContent = "更新";
        } else {
          setScore(50);
          saveBtn.textContent = "保存";
        }
      } else {
        setScore(50);
        saveBtn.textContent = "保存";
      }
    } catch(e) {
      setScore(50);
    }
  }

  // スコア保存
  document.getElementById("btnSaveScore").addEventListener("click", async () => {
    const score = slider.value;
    const note  = document.getElementById("noteInput").value.trim();
    const saved = document.getElementById("scoreSaved");
    const date  = document.getElementById("dateInput").value;
    try {
      await setDoc(doc(db, SCORE_COL, date), {
        col1: date, col2: score, col3: note,
        createdAt: new Date().toISOString()
      });
      document.getElementById("btnSaveScore").textContent = "更新";
      saved.textContent = "✓ 保存しました";
      setTimeout(() => saved.textContent = "", 2000);
      loadHistory();
    } catch(e) {
      saved.textContent = "エラー: " + e.message;
    }
  });

  // GPS
  document.getElementById("btnGps").addEventListener("click", () => {
    if (!navigator.geolocation) { alert("位置情報非対応"); return; }
    const btn = document.getElementById("btnGps");
    btn.textContent = "取得中...";
    navigator.geolocation.getCurrentPosition(async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`
        );
        const data = await res.json();
        const addr = data.address;
        const place = [addr.city||addr.town||addr.village, addr.suburb||addr.neighbourhood||addr.quarter]
          .filter(Boolean).join(" ");
        document.getElementById("placeInput").value = place || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      } catch {
        document.getElementById("placeInput").value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
      btn.textContent = "📍 現在地";
    }, () => {
      alert("位置情報を取得できませんでした");
      btn.textContent = "📍 現在地";
    });
  });

  // 訪問記録追加
  document.getElementById("btnAddVisit").addEventListener("click", async () => {
    const place  = document.getElementById("placeInput").value.trim();
    const date   = document.getElementById("dateInput").value;
    const time   = document.getElementById("timeInput").value;
    const memo   = document.getElementById("memoInput").value.trim();
    const status = document.getElementById("visitStatus");
    if (!place) { document.getElementById("placeInput").focus(); return; }
    try {
      await addDoc(collection(db, VISIT_COL), {
        place, date, time, memo, lat: null, lng: null,
        createdAt: new Date().toISOString()
      });
      document.getElementById("placeInput").value = "";
      document.getElementById("memoInput").value  = "";
      status.textContent = "✓ 追加しました";
      setTimeout(() => status.textContent = "", 2000);
      loadHistory();
    } catch(e) {
      status.textContent = "エラー: " + e.message;
    }
  });

  // 履歴表示
  async function loadHistory() {
    alert("[C-4] loadHistory開始");
    const listEl = document.getElementById("historyList");
    const emptyMsg = document.getElementById("emptyMsg");
    listEl.innerHTML = "";

    let scoreSnap, visitSnap;
    try {
      [scoreSnap, visitSnap] = await Promise.all([
        getDocs(collection(db, SCORE_COL)),
        getDocs(query(collection(db, VISIT_COL), orderBy("createdAt", "desc")))
      ]);
    } catch(e) {
      alert("[C-5-ERR] 履歴読み込みエラー: " + e.message);
      return;
    }
    alert("[C-5] scoreSnap: " + scoreSnap.size + "件 / visitSnap: " + visitSnap.size + "件");

    // チェックマップ（失敗してもスコア・訪問には影響させない）
    const checkMap = {};
    try {
      const checkSnap = await getDocs(collection(db, CHECK_COL));
      checkSnap.forEach(d => { checkMap[d.id] = d.data(); });
    } catch(e) { console.warn("checkMap load failed:", e); }

    // スコアマップ
    const scoreMap = {};
    scoreSnap.forEach(d => {
      const id = d.id;
      const data = d.data();
      if (DATE_RE.test(id) && !isNaN(Number(data.col2))) {
        scoreMap[id] = { score: Number(data.col2), note: data.col3 || "" };
      }
    });

    // 訪問マップ
    const visitMap = {};
    visitSnap.forEach(d => {
      const data = d.data();
      if (!data.date) return;
      if (!visitMap[data.date]) visitMap[data.date] = [];
      visitMap[data.date].push({ place: data.place||"—", time: data.time||"", memo: data.memo||"" });
    });

    // 日付マージ・新しい順・3件
    const allDates = [...new Set([...Object.keys(scoreMap), ...Object.keys(visitMap)])]
      .sort((a, b) => b.localeCompare(a))
      .slice(0, 3);

    if (allDates.length === 0) { emptyMsg.style.display = "block"; return; }
    emptyMsg.style.display = "none";

    allDates.forEach(date => {
      const [y, m, d2] = date.split("-");
      const dow  = DOW[new Date(date).getDay()];
      const label = `${y}年${parseInt(m)}月${parseInt(d2)}日`;
      const score  = scoreMap[date];
      const visits = visitMap[date] || [];

      const card = document.createElement("div");
      card.className = "day-card";
      card.innerHTML = `<div class="day-header"><span class="day-date">${label}</span><span class="day-dow">${dow}曜</span></div>`;

      if (score) {
        const s = document.createElement("div");
        s.innerHTML = `
          <div class="score-row">
            <span class="score-label">スコア</span>
            <div class="bar-wrap"><div class="bar" style="width:${score.score}%"></div></div>
            <span class="score-val">${score.score}</span>
          </div>
          ${score.note ? `<div class="score-note">${score.note}</div>` : ""}
        `;
        card.appendChild(s);
      }

      // チェックタグ
      const chk = checkMap[date];
      if (chk) {
        const tags = [];
        if (chk.crossed_midnight) tags.push("日を跨いだ");
        if (chk.ate_meal)         tags.push("ご飯食べた");
        if (tags.length) {
          const tagDiv = document.createElement("div");
          tagDiv.className = "check-tags";
          tagDiv.innerHTML = tags.map(t => `<span class="check-tag">✓ ${t}</span>`).join("");
          card.appendChild(tagDiv);
        }
      }

      visits.sort((a, b) => a.time.localeCompare(b.time));
      visits.forEach(v => {
        const vDiv = document.createElement("div");
        vDiv.className = "visit-item";
        vDiv.innerHTML = `
          <span class="visit-item-icon">📍</span>
          <div>
            <div class="visit-item-place">${v.place}</div>
            ${v.time ? `<div class="visit-item-time">${v.time}</div>` : ""}
            ${v.memo ? `<div class="visit-item-time">${v.memo}</div>` : ""}
          </div>
        `;
        card.appendChild(vDiv);
      });

      listEl.appendChild(card);
    });
  }

  alert("[C-2] 初期化開始 today=" + today);
  loadChecks(today);
  loadTodayScore(today);

  // 日付を手動変更したときも再読み込み
  document.getElementById("dateInput").addEventListener("change", (e) => {
    const d = e.target.value;
    document.getElementById("scoreDate").textContent = d;
    loadChecks(d);
    loadTodayScore(d);
  });
  showDateConfirm();
  alert("[C-3] loadHistory呼び出し直前");
  loadHistory();
</script>
</body>
</html>
