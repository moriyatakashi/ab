<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m2 / 今日の記録</title>
<link rel="stylesheet" href="../style.css">
<style>
  .back-link { display:inline-block; font-size:0.8rem; color:var(--text-soft); text-decoration:none; margin-bottom:20px; }
  .back-link:hover { color:var(--accent); }

  /* セクション */
  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin: 0 0 14px;
  }

  /* スコア */
  .score-display {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .score-num {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    min-width: 64px;
    text-align: center;
    line-height: 1;
  }
  .score-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--accent-soft);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .score-date {
    font-size: 0.78rem;
    color: var(--text-soft);
  }
  .note-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .note-input:focus { outline: none; border-color: var(--accent); }

  .btn-save-score {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .score-saved {
    font-size: 0.78rem;
    color: var(--text-soft);
    margin-top: 8px;
    text-align: center;
    min-height: 1.2em;
  }

  /* 訪問記録 */
  .visit-form { display: flex; flex-direction: column; gap: 10px; }
  .visit-form input {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
  }
  .visit-form input:focus { outline: none; border-color: var(--accent); }
  .visit-row-inputs { display: flex; gap: 8px; }
  .visit-row-inputs input { flex: 1; }
  .btn-gps {
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .btn-add-visit {
    width: 100%;
    padding: 12px;
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
  }

  /* 履歴 */
  .history-section { margin-top: 24px; }
  .history-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 10px;
  }
  .day-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .day-date { font-size: 0.9rem; font-weight: 700; }
  .day-dow { font-size: 0.75rem; color: var(--text-soft); }
  .score-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
  }
  .score-label { font-size: 0.7rem; color: var(--text-soft); width: 36px; }
  .bar-wrap { flex:1; height:5px; background:var(--accent-soft); border-radius:3px; overflow:hidden; }
  .bar { height:100%; background:var(--accent); border-radius:3px; }
  .score-val { font-size:1.1rem; font-weight:700; color:var(--accent); min-width:34px; text-align:right; }
  .score-note { font-size:0.75rem; color:var(--text-soft); padding-left:46px; margin-bottom:6px; }
  .visit-item {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 0.82rem; color: var(--text); padding: 4px 0;
  }
  .visit-item-icon { color: var(--text-soft); flex-shrink: 0; }
  .visit-item-place { font-weight: 600; }
  .visit-item-time { color: var(--text-soft); font-size: 0.72rem; }
  .check-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .review-banner {
    display: flex; align-items: center; gap: 14px;
    background: var(--accent); color: #fff;
    border-radius: 12px; padding: 16px 18px; margin-bottom: 12px;
    text-decoration: none; transition: opacity 0.15s;
  }
  .review-banner:hover { opacity: 0.88; }
  .review-banner-icon { font-size: 1.6rem; flex-shrink: 0; }
  .review-banner-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
  .review-banner-sub { font-size: 0.75rem; opacity: 0.85; }
  .check-tag {
    font-size: 0.68rem; color: var(--accent);
    background: var(--accent-soft); border-radius: 10px;
    padding: 2px 8px; pointer-events: none;
  }

  /* 出来事メモ */
  .memo-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .memo-item { display: flex; gap: 8px; align-items: flex-start; }
  .memo-date-tag { font-size: 0.68rem; color: var(--accent); background: var(--accent-soft); border-radius: 6px; padding: 2px 7px; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
  .memo-text { font-size: 0.85rem; color: var(--text); flex: 1; }
  .memo-input-date { width: 130px; padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; background: var(--bg); color: var(--text); }
  .memo-input-date:focus { outline: none; border-color: var(--accent); }
  .updated { font-size:0.72rem; color:var(--text-soft); margin-top:32px; text-align:right; }

  /* チェック項目 */
  .check-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .check-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .check-item:last-child { border-bottom: none; }
  .check-box {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 0.85rem; transition: all 0.15s;
  }
  .check-box.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
  .check-label { font-size: 0.9rem; font-weight: 600; color: var(--text); flex: 1; }
  .check-done { font-size: 0.72rem; color: var(--text-soft); }
  .check-item.done .check-label { color: var(--text-soft); text-decoration: line-through; }

  /* 日付確認バナー */
  .date-confirm {
    background: #fff8e8; border: 1px solid #f0c040;
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 12px; display: none;
  }
  .date-confirm.show { display: flex; align-items: center; gap: 10px; }
  .date-confirm-text { font-size: 0.82rem; color: #7a6020; flex: 1; }
  .date-confirm-btns { display: flex; gap: 6px; }
  .date-btn {
    font-size: 0.75rem; padding: 5px 10px; border-radius: 6px;
    border: 1px solid #f0c040; background: #fff; color: #7a6020; cursor: pointer;
  }
  .date-btn.primary { background: #f0c040; color: #1a1a00; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← ab トップ</a>
  <h1>今日の記録</h1>

  <!-- 振り返りバナー -->
  <a class="review-banner" id="reviewBanner" href="../m9/" style="display:none;">
    <span class="review-banner-icon">🔁</span>
    <div>
      <div class="review-banner-title">今日は振り返りの日です</div>
      <div class="review-banner-sub" id="reviewBannerSub">m9 振り返りページへ →</div>
    </div>
  </a>

  <!-- 日付確認バナー -->
  <div class="date-confirm" id="dateConfirm">
    <div class="date-confirm-text" id="dateConfirmText"></div>
    <div class="date-confirm-btns">
      <button class="date-btn primary" id="dateConfirmYes">はい</button>
      <button class="date-btn" id="dateConfirmNo" id="dateConfirmNo">変更する</button>
    </div>
  </div>

  <!-- チェック項目 -->
  <div class="check-section" id="checkSection">
    <div class="section-title">チェック</div>
    <div class="check-item" id="checkMidnight" data-key="crossed_midnight">
      <div class="check-box" id="boxMidnight"></div>
      <div class="check-label">日を跨いだ</div>
      <div class="check-done" id="doneMidnight"></div>
    </div>
    <div class="check-item" id="checkMeal" data-key="ate_meal">
      <div class="check-box" id="boxMeal"></div>
      <div class="check-label">ご飯食べた</div>
      <div class="check-done" id="doneMeal"></div>
    </div>
  </div>

  <!-- スコア入力 -->
  <div class="section">
    <div class="section-title">スコア</div>
    <div class="score-display">
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-bar-wrap">
        <input type="range" id="slider" min="0" max="100" value="50">
        <div class="score-date" id="scoreDate"></div>
      </div>
    </div>
    <input class="note-input" id="noteInput" type="text" placeholder="一言メモ（任意）">
    <button class="btn-save-score" id="btnSaveScore">保存</button>
    <div class="score-saved" id="scoreSaved"></div>
  </div>

  <!-- 訪問記録 -->
  <div class="section">
    <div class="section-title">訪問記録</div>
    <div class="visit-form">
      <div class="visit-row-inputs">
        <input type="text" id="placeInput" placeholder="場所">
        <button class="btn-gps" id="btnGps">📍 現在地</button>
      </div>
      <div class="visit-row-inputs">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
      </div>
      <input type="text" id="memoInput" placeholder="メモ（任意）">
      <button class="btn-add-visit" id="btnAddVisit">＋ 追加</button>
    </div>
    <div class="status" id="visitStatus"></div>
  </div>

  <!-- 出来事メモ -->
  <div class="section">
    <div class="section-title">出来事メモ</div>
    <div class="visit-form">
      <div class="visit-row-inputs">
        <input class="memo-input-date" type="date" id="memoDateInput">
        <input type="text" id="memoTextInput" placeholder="メモを入力" style="flex:1;">
      </div>
      <button class="btn-add-visit" id="btnAddMemo">＋ メモを追加</button>
    </div>
    <div class="status" id="memoStatus"></div>
    <div class="memo-list" id="memoList"></div>
  </div>

  <!-- 履歴 -->
  <div class="history-section">
    <div class="history-label">直近の記録</div>
    <div id="historyList"></div>
    <p class="empty" id="emptyMsg" style="display:none;">記録はまだありません</p>
    <a href="../m1/" style="display:block; text-align:center; font-size:0.8rem; color:var(--accent); padding:12px 0; text-decoration:none;">もっと見る →</a>
  </div>

  <p class="updated">更新: 2026-06-28 12:59</p>
</div>

<script type="module">
  import { db } from "../lib/firebase.js";
  import { todayStr } from "../lib/date.js";
  import { collection, getDocs, doc, setDoc, getDoc, addDoc, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const SCORE_COL = "ab_items2";
  const MEMO_COL  = "ab_memos";
  const VISIT_COL = "ab_visits";
  const DATE_RE   = /^\d{4}-\d{2}-\d{2}$/;
  const DOW       = ["日","月","火","水","木","金","土"];

  // DOM要素キャッシュ
  const $ = id => document.getElementById(id);
  const elDateInput    = $("dateInput");
  const elScoreDate    = $("scoreDate");
  const elReviewBanner = $("reviewBanner");
  const elReviewBannerSub = $("reviewBannerSub");
  const elBtnSaveScore = $("btnSaveScore");
  const elNoteInput    = $("noteInput");
  const elScoreSaved   = $("scoreSaved");
  const elPlaceInput   = $("placeInput");
  const elMemoInput    = $("memoInput");
  const elVisitStatus  = $("visitStatus");
  const elHistoryList  = $("historyList");
  const elEmptyMsg     = $("emptyMsg");
    const elMemoDateInput = $("memoDateInput");
  const elMemoTextInput = $("memoTextInput");
  const elMemoStatus    = $("memoStatus");
  const elMemoList      = $("memoList");
  const elTimeInput    = $("timeInput");
  const elSlider       = $("slider");
  const elScoreNum     = $("scoreNum");
  const elBtnGps       = $("btnGps");
  const elBtnAddVisit  = $("btnAddVisit");
  const elCheckMidnight = $("checkMidnight");
  const elCheckMeal    = $("checkMeal");
  const elDateConfirm  = $("dateConfirm");
  const elDateConfirmText = $("dateConfirmText");
  const elDateConfirmYes  = $("dateConfirmYes");
  const elDateConfirmNo   = $("dateConfirmNo");

  // 今日の日付をセット
  const today = todayStr();
  elScoreDate.textContent = today;
  elDateInput.value = today;
  elMemoDateInput.value = today;
  const now = new Date();
  elTimeInput.value =
    String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");


  // ── チェック項目 ──────────────────────────────────────
  const CHECK_COL = "ab_checks";
  let checkData = { crossed_midnight: false, ate_meal: false };

  async function loadChecks(date) {
    try {
      const d = await getDoc(doc(db, CHECK_COL, date));
      if (d.exists()) {
        const data = d.data();
        checkData = { ...checkData, ...data };
        if (data.reviewDate) {
          const todayVal = todayStr();
          if (reviewDateVal === todayVal) {
            elReviewBanner.style.display = "flex";
          } else {
            elReviewBanner.style.display = "none";
          }
        } else {
          elReviewBanner.style.display = "none";
        }
        // 前回の振り返り日を取得してバナーに表示
        try {
          const revSnap = await getDocs(collection(db, "ab_reviews"));
          const past = [];
          revSnap.forEach(d => { if (d.id < todayStr()) past.push(d.data()); });
          past.sort((a, b) => b.date.localeCompare(a.date));
          if (past.length > 0) {
            const [y, m, d2] = past[0].date.split("-");
            elReviewBannerSub.textContent =
              `前回: ${parseInt(m)}/${parseInt(d2)} → m9 振り返りページへ →`;
          }
        } catch(e) { console.warn("review banner sub failed:", e); }
      }
    } catch(e) { console.warn("loadChecks failed:", e); }
    renderChecks();
  }

  async function saveCheck(key, value) {
    checkData[key] = value;
    try {
      await setDoc(doc(db, CHECK_COL, elDateInput.value), {
        ...checkData,
        date: elDateInput.value,
        updatedAt: new Date().toISOString()
      });
    } catch(e) { console.warn("check save failed:", e); }
    renderChecks();
  }

  function renderChecks() {
    [
      { key: "crossed_midnight", boxId: "boxMidnight", itemId: "checkMidnight", doneId: "doneMidnight" },
      { key: "ate_meal",         boxId: "boxMeal",     itemId: "checkMeal",     doneId: "doneMeal" }
    ].forEach(({ key, boxId, itemId, doneId }) => {
      const checked = checkData[key];
      const box  = document.getElementById(boxId);
      const item = document.getElementById(itemId);
      const done = document.getElementById(doneId);
      box.textContent  = checked ? "✓" : "";
      box.className    = "check-box" + (checked ? " checked" : "");
      item.className   = "check-item" + (checked ? " done" : "");
      done.textContent = checked ? "済" : "";
    });
  }


  elCheckMidnight.addEventListener("click", () => {
    saveCheck("crossed_midnight", !checkData.crossed_midnight);
  });
  elCheckMeal.addEventListener("click", () => {
    saveCheck("ate_meal", !checkData.ate_meal);
  });

  // ── 日付確認バナー ────────────────────────────────────
  function showDateConfirm() {
    const now  = new Date();
    const h    = now.getHours();
    const m    = now.getMinutes();
    const hm   = h * 60 + m;

    // 22:15〜23:59 または 0:00〜7:00 の場合に表示
    const isLateNight  = hm >= 22 * 60 + 15;
    const isEarlyMorning = hm < 7 * 60;
    if (!isLateNight && !isEarlyMorning) return;

    const confirmEl = elDateConfirm;
    const textEl    = elDateConfirmText;

    if (isLateNight) {
      const d = now.getDate();
      const m2 = now.getMonth() + 1;
      textEl.textContent = `⚠️ ${m2}/${d}（今日）の記録でいいですか？`;
    } else {
      // 0:00〜7:00 → 前日を提案
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const d = yesterday.getDate();
      const m2 = yesterday.getMonth() + 1;
      textEl.textContent = `⚠️ ${m2}/${d}（昨日）の記録ですか？`;
      // 「はい」で前日にセット
      elDateConfirmYes.addEventListener("click", () => {
        const yStr = todayStr(yesterday);
        elDateInput.value  = yStr;
        elScoreDate.textContent = yStr;
        loadChecks(yStr);
        loadTodayScore(yStr);
        confirmEl.classList.remove("show");
      }, { once: true });
    }

    confirmEl.classList.add("show");
    elDateConfirmYes.addEventListener("click", () => {
      confirmEl.classList.remove("show");
    }, { once: true });
    elDateConfirmNo.addEventListener("click", () => {
      confirmEl.classList.remove("show");
      elDateInput.focus();
    });
  }

  // スライダー ↔ 数値 双方向連動
  const slider   = elSlider;
  const scoreNum = elScoreNum;

  function setScore(val) {
    const v = Math.min(100, Math.max(0, Number(val)));
    slider.value        = v;
    scoreNum.textContent = v;
  }

  slider.addEventListener("input", () => {
    scoreNum.textContent = slider.value;
  });

  // 今日のスコアをFirestoreから読み込む
  async function loadTodayScore(date) {
    const saveBtn = elBtnSaveScore;
    try {
      const d = await getDoc(doc(db, SCORE_COL, date));
      if (d.exists()) {
        const data = d.data();
        const v = Number(data.col2);
        if (!isNaN(v)) {
          setScore(v);
          elNoteInput.value = data.col3 || "";
          saveBtn.textContent = "更新";
        } else {
          setScore(50);
          saveBtn.textContent = "保存";
        }
      } else {
        setScore(50);
        saveBtn.textContent = "保存";
      }
    } catch(e) {
      setScore(50);
    }
  }

  // スコア保存
  elBtnSaveScore.addEventListener("click", async () => {
    const score = slider.value;
    const note  = elNoteInput.value.trim();
    const saved = elScoreSaved;
    const date  = elDateInput.value;
    try {
      await setDoc(doc(db, SCORE_COL, date), {
        col1: date, col2: score, col3: note,
        createdAt: new Date().toISOString()
      });
      elBtnSaveScore.textContent = "更新";
      saved.textContent = "✓ 保存しました";
      setTimeout(() => saved.textContent = "", 2000);
      loadHistory();
    } catch(e) {
      saved.textContent = "エラー: " + e.message;
    }
  });

  // メモ追加
  $("btnAddMemo").addEventListener("click", async () => {
    const date = elMemoDateInput.value;
    const memo = elMemoTextInput.value.trim();
    if (!memo) { elMemoTextInput.focus(); return; }
    try {
      await addDoc(collection(db, MEMO_COL), {
        date, memo, createdAt: new Date().toISOString()
      });
      elMemoTextInput.value = "";
      elMemoStatus.textContent = "✓ 追加しました";
      setTimeout(() => elMemoStatus.textContent = "", 2000);
      loadTodayMemos();
      loadHistory();
    } catch(e) { elMemoStatus.textContent = "エラー: " + e.message; }
  });

  // 今日のメモを読み込んで表示
  async function loadTodayMemos() {
    try {
      const snap = await getDocs(query(collection(db, MEMO_COL), orderBy("createdAt", "desc")));
      const todayItems = [];
      snap.forEach(d => { if (d.data().date === today) todayItems.push(d.data()); });
      elMemoList.innerHTML = "";
      todayItems.forEach(m => {
        const div = document.createElement("div");
        div.className = "memo-item";
        div.innerHTML = `<span class="memo-date-tag">今日</span><span class="memo-text">${m.memo}</span>`;
        elMemoList.appendChild(div);
      });
    } catch(e) { console.warn("loadTodayMemos failed:", e); }
  }
  let _lat = null, _lng = null;  // GPSで取得した座標を保持

  elBtnGps.addEventListener("click", () => {
    if (!navigator.geolocation) { alert("位置情報非対応"); return; }
    const btn = elBtnGps;
    btn.textContent = "取得中...";
    navigator.geolocation.getCurrentPosition(async pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      _lat = lat; _lng = lng;  // 保存用に保持
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ja`
        );
        const data = await res.json();
        const addr = data.address;
        const place = [addr.city||addr.town||addr.village, addr.suburb||addr.neighbourhood||addr.quarter]
          .filter(Boolean).join(" ");
        elPlaceInput.value = place || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      } catch {
        elPlaceInput.value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      }
      btn.textContent = "📍 現在地";
    }, () => {
      alert("位置情報を取得できませんでした");
      btn.textContent = "📍 現在地";
    });
  });

  // 訪問記録追加
  elBtnAddVisit.addEventListener("click", async () => {
    const place  = elPlaceInput.value.trim();
    const date   = elDateInput.value;
    const time   = elTimeInput.value;
    const memo   = elMemoInput.value.trim();
    const status = elVisitStatus;
    if (!place) { elPlaceInput.focus(); return; }
    try {
      await addDoc(collection(db, VISIT_COL), {
        place, date, time, memo, lat: _lat, lng: _lng,
        createdAt: new Date().toISOString()
      });
      elPlaceInput.value = "";
      elMemoInput.value  = "";
      _lat = null; _lng = null;
      status.textContent = "✓ 追加しました";
      setTimeout(() => status.textContent = "", 2000);
      loadHistory();
    } catch(e) {
      status.textContent = "エラー: " + e.message;
    }
  });

  // 履歴表示
  async function loadHistory() {
    
    const listEl = elHistoryList;
    const emptyMsg = elEmptyMsg;
    listEl.innerHTML = "";

    let scoreSnap, visitSnap;
    try {
      [scoreSnap, visitSnap] = await Promise.all([
        getDocs(collection(db, SCORE_COL)),
        getDocs(query(collection(db, VISIT_COL), orderBy("createdAt", "desc")))
      ]);
    } catch(e) {
      
      return;
    }
    

    // チェックマップ（失敗してもスコア・訪問には影響させない）
    const checkMap = {};
    try {
      const checkSnap = await getDocs(collection(db, CHECK_COL));
      checkSnap.forEach(d => { checkMap[d.id] = d.data(); });
    } catch(e) { console.warn("checkMap load failed:", e); }

    // スコアマップ
    const scoreMap = {};
    scoreSnap.forEach(d => {
      const id = d.id;
      const data = d.data();
      if (DATE_RE.test(id) && !isNaN(Number(data.col2))) {
        scoreMap[id] = { score: Number(data.col2), note: data.col3 || "" };
      }
    });

    // 訪問マップ
    const visitMap = {};
    visitSnap.forEach(d => {
      const data = d.data();
      if (!data.date) return;
      if (!visitMap[data.date]) visitMap[data.date] = [];
      visitMap[data.date].push({ place: data.place||"—", time: data.time||"", memo: data.memo||"" });
    });

    // 日付マージ・新しい順・3件
    const allDates = [...new Set([...Object.keys(scoreMap), ...Object.keys(visitMap)])]
      .sort((a, b) => b.localeCompare(a))
      .slice(0, 3);

    if (allDates.length === 0) { emptyMsg.style.display = "block"; return; }
    emptyMsg.style.display = "none";

    allDates.forEach(date => {
      const [y, m, d2] = date.split("-");
      const dow  = DOW[new Date(date).getDay()];
      const label = `${y}年${parseInt(m)}月${parseInt(d2)}日`;
      const score  = scoreMap[date];
      const visits = visitMap[date] || [];

      const card = document.createElement("div");
      card.className = "day-card";
      card.innerHTML = `<div class="day-header"><span class="day-date">${label}</span><span class="day-dow">${dow}曜</span></div>`;

      if (score) {
        const s = document.createElement("div");
        s.innerHTML = `
          <div class="score-row">
            <span class="score-label">スコア</span>
            <div class="bar-wrap"><div class="bar" style="width:${score.score}%"></div></div>
            <span class="score-val">${score.score}</span>
          </div>
          ${score.note ? `<div class="score-note">${score.note}</div>` : ""}
        `;
        card.appendChild(s);
      }

      // チェックタグ
      const chk = checkMap[date];
      if (chk) {
        const tags = [];
        if (chk.crossed_midnight) tags.push("日を跨いだ");
        if (chk.ate_meal)         tags.push("ご飯食べた");
        if (tags.length) {
          const tagDiv = document.createElement("div");
          tagDiv.className = "check-tags";
          tagDiv.innerHTML = tags.map(t => `<span class="check-tag">✓ ${t}</span>`).join("");
          card.appendChild(tagDiv);
        }
      }

      visits.sort((a, b) => a.time.localeCompare(b.time));
      visits.forEach(v => {
        const vDiv = document.createElement("div");
        vDiv.className = "visit-item";
        vDiv.innerHTML = `
          <span class="visit-item-icon">📍</span>
          <div>
            <div class="visit-item-place">${v.place}</div>
            ${v.time ? `<div class="visit-item-time">${v.time}</div>` : ""}
            ${v.memo ? `<div class="visit-item-time">${v.memo}</div>` : ""}
          </div>
        `;
        card.appendChild(vDiv);
      });

      listEl.appendChild(card);
    });
  }

  loadChecks(today);
  loadTodayScore(today);
  loadTodayMemos();

  // 日付を手動変更したときも再読み込み
  elDateInput.addEventListener("change", (e) => {
    const d = e.target.value;
    elScoreDate.textContent = d;
    loadChecks(d);
    loadTodayScore(d);
  });
  showDateConfirm();
  loadHistory();
</script>
</body>
</html>
